syntax = "proto3";

package model_express.p2p;

// P2P Metadata Service for coordinating NIXL/RDMA transfers between vLLM instances.
// The server stores model metadata keyed by mx_source_id (a hash of SourceIdentity).
// Clients query for existing sources and publish their own metadata.
service P2pService {
  // Publish model metadata - called by client after loading model weights
  rpc PublishMetadata(PublishMetadataRequest) returns (PublishMetadataResponse);

  // List available source workers - lightweight, no tensor metadata.
  // Returns one SourceInstanceRef per worker; clients filter by worker_rank
  // to find matching peers and then call GetMetadata for the chosen one.
  rpc ListSources(ListSourcesRequest) returns (ListSourcesResponse);

  // Fetch full tensor metadata for one specific worker (MB-scale).
  // Call this after filtering ListSources results by worker_rank.
  rpc GetMetadata(GetMetadataRequest) returns (GetMetadataResponse);

  // Update source status - called by source after NIXL registration and warmup
  rpc UpdateStatus(UpdateStatusRequest) returns (UpdateStatusResponse);
}

// ============================================================================
// Source Identity
// ============================================================================

// Inference backend framework
enum BackendFramework {
  BACKEND_FRAMEWORK_UNKNOWN = 0;
  BACKEND_FRAMEWORK_VLLM = 1;
  BACKEND_FRAMEWORK_SGLANG = 2;
  BACKEND_FRAMEWORK_TRT_LLM = 3;
}

// Type of tensors the source is serving
enum MxSourceType {
  MX_SOURCE_TYPE_WEIGHTS = 0;    // Base model weights (default)
  MX_SOURCE_TYPE_LORA = 1;       // LoRA adapter weights
  MX_SOURCE_TYPE_CUDA_GRAPH = 2; // CUDA graph artifacts
}

// All fields that affect weight tensor layout and transfer compatibility.
// The server computes SHA256(canonical_json(identity)) and takes the first
// 16 hex chars as the mx_source_id used to key metadata storage.
message SourceIdentity {
  // ModelExpress version (e.g., "0.3.0"). Ensures format compatibility across upgrades.
  string mx_version = 1;

  // Type of tensors being served
  MxSourceType mx_source_type = 2;

  // Model name (e.g., "deepseek-ai/DeepSeek-V3")
  string model_name = 3;

  // Inference framework
  BackendFramework backend_framework = 4;

  // Tensor parallel degree
  uint32 tensor_parallel_size = 5;

  // Pipeline parallel degree
  uint32 pipeline_parallel_size = 6;

  // Expert parallel degree (MoE models)
  uint32 expert_parallel_size = 7;

  // Weight dtype (e.g., "bfloat16", "float8_e4m3fn")
  string dtype = 8;

  // Quantization method (e.g., "fp8", "awq", "gptq", or empty)
  string quantization = 9;

  // Escape hatch for framework-specific config
  map<string, string> extra_parameters = 10;
}

// ============================================================================
// Tensor Descriptors
// ============================================================================

message TensorDescriptor {
  // Tensor name (e.g., "model.layers.0.self_attn.q_proj.weight")
  string name = 1;

  // GPU memory address
  uint64 addr = 2;

  // Size in bytes
  uint64 size = 3;

  // GPU device ID (0-7 for 8-GPU setup)
  uint32 device_id = 4;

  // Data type (e.g., "float16", "bfloat16")
  string dtype = 5;
}

// ============================================================================
// Worker Metadata
// ============================================================================

// Source lifecycle status
enum SourceStatus {
  SOURCE_STATUS_UNKNOWN = 0;        // uninitialized (proto3 zero default)
  SOURCE_STATUS_INITIALIZING = 1;  // publishing metadata
  SOURCE_STATUS_READY = 2;         // ready for transfers
  SOURCE_STATUS_STALE = 3;         // source gone, metadata may be stale
}

message WorkerMetadata {
  // Worker rank (GPU index within the instance)
  uint32 worker_rank = 1;

  // Backend-specific metadata for establishing transfers.
  // NIXL: serialized agent metadata for RDMA connections.
  // TransferEngine: Mooncake session ID ("ip:port").
  oneof backend_metadata {
    bytes nixl_metadata = 2;
    string transfer_engine_session_id = 10;
  }

  // Tensor descriptors for this worker's GPU
  repeated TensorDescriptor tensors = 3;

  // Worker lifecycle status
  SourceStatus status = 4;

  // Timestamp of last status update (unix millis)
  int64 updated_at = 5;

  // P2P metadata exchange fields (opt-in via MX_P2P_METADATA=1).
  // When populated, targets fetch NIXL metadata and tensor manifests
  // directly from the source worker instead of from the central server.

  // host:port where NIXL listen thread accepts incoming metadata fetches
  string metadata_endpoint = 6;

  // NIXL agent name (used by targets to identify the remote agent)
  string agent_name = 7;

  // host:port for the worker's gRPC WorkerService (tensor manifest)
  string worker_grpc_endpoint = 8;

  // CUDA allocation end addresses for pool-based transfer coalescing.
  // Constrains coalescing so merged regions don't span cudaMalloc blocks.
  repeated uint64 alloc_ends = 9;
}

// ============================================================================
// Worker Service (P2P tensor manifest exchange)
// ============================================================================

// Per-worker gRPC service for direct tensor manifest retrieval.
// Sources start this service when MX_P2P_METADATA=1. Targets call
// GetTensorManifest to fetch tensor descriptors directly from the
// source worker instead of from the central metadata server.
service WorkerService {
  rpc GetTensorManifest(GetTensorManifestRequest) returns (GetTensorManifestResponse);
}

message GetTensorManifestRequest {
  // mx_source_id for validation (catches stale discovery)
  string mx_source_id = 1;
}

message GetTensorManifestResponse {
  repeated TensorDescriptor tensors = 1;
  // Echoed mx_source_id for confirmation
  string mx_source_id = 2;

  // CUDA allocation end addresses on the source GPU.
  // Used by the target to constrain transfer coalescing so that merged
  // regions don't span multiple cudaMalloc blocks (which would break
  // UCX's rcache and produce invalid rkeys for RDMA).
  repeated uint64 alloc_ends = 3;
}

// ============================================================================
// Publish Metadata
// ============================================================================

message PublishMetadataRequest {
  // Source identity — the server computes mx_source_id from this
  SourceIdentity identity = 1;

  // Metadata for this worker (one call per worker)
  WorkerMetadata worker = 2;

  // Unique identifier for this running instance (UUID).
  // Differentiates multiple replicas with identical SourceIdentity.
  // If empty, the server rejects the request.
  string worker_id = 3;
}

message PublishMetadataResponse {
  bool success = 1;
  string message = 2;
  // Computed 16-char hex key returned to client for use in subsequent calls
  string mx_source_id = 3;
  // Echoed worker_id for confirmation
  string worker_id = 4;
}

// ============================================================================
// List Sources
// ============================================================================

// Reference to one worker in one available source instance (lightweight — no tensor metadata).
// One entry is emitted per worker, so clients can match on worker_rank without calling GetMetadata.
message SourceInstanceRef {
  // Computed 16-char hex source ID
  string mx_source_id = 1;

  // Unique identifier for this running instance
  string worker_id = 2;

  // Human-readable model name
  string model_name = 3;

  // Global rank of this worker within the instance.
  // Clients filter on this field to find a peer with a matching rank.
  uint32 worker_rank = 4;
}

message ListSourcesRequest {
  // Filter by source identity — server computes mx_source_id.
  // If not set, instances across all sources are returned.
  SourceIdentity identity = 1;

  // Filter by worker status. Not set = return workers in all statuses.
  optional SourceStatus status_filter = 2;
}

message ListSourcesResponse {
  repeated SourceInstanceRef instances = 1;
}

// ============================================================================
// Get Metadata
// ============================================================================

message GetMetadataRequest {
  // mx_source_id from a ListSourcesResponse or PublishMetadataResponse
  string mx_source_id = 1;

  // worker_id from a ListSourcesResponse or PublishMetadataResponse
  string worker_id = 2;
}

message GetMetadataResponse {
  // Whether the requested worker was found
  bool found = 1;

  // Metadata for the requested worker (MB-scale; only fetched on demand)
  WorkerMetadata worker = 2;

  // Echoed mx_source_id
  string mx_source_id = 3;

  // Echoed worker_id
  string worker_id = 4;
}

// ============================================================================
// Status Coordination
// ============================================================================

message UpdateStatusRequest {
  // mx_source_id returned from PublishMetadata
  string mx_source_id = 1;

  // Worker rank (GPU index)
  uint32 worker_rank = 2;

  // New status
  SourceStatus status = 3;

  // worker_id returned from PublishMetadata
  string worker_id = 4;
}

message UpdateStatusResponse {
  bool success = 1;
  string message = 2;
}
