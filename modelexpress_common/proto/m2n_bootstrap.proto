syntax = "proto3";

package model_express.m2n_bootstrap;

// Ephemeral control-plane broker for a coordinator-defined NCCL communicator.
// NeMo RL/Dynamo owns membership and rank assignment; ModelExpress only stores
// an immutable UID record and fences aborted or expired attempts.
service M2nBootstrapService {
  rpc PublishBootstrap(PublishM2nBootstrapRequest) returns (PublishM2nBootstrapResponse);
  rpc GetBootstrap(GetM2nBootstrapRequest) returns (GetM2nBootstrapResponse);
  rpc AbortBootstrap(AbortM2nBootstrapRequest) returns (AbortM2nBootstrapResponse);
}

enum M2nBootstrapState {
  M2N_BOOTSTRAP_STATE_UNKNOWN = 0;
  M2N_BOOTSTRAP_STATE_PUBLISHED = 1;
  M2N_BOOTSTRAP_STATE_ABORTED = 2;
  M2N_BOOTSTRAP_STATE_EXPIRED = 3;
}

message M2nBootstrapKey {
  string job_id = 1;
  string attempt_id = 2;
  string cohort_id = 3;
}

message M2nBootstrapRecord {
  M2nBootstrapKey key = 1;
  bytes nccl_unique_id = 2;
  uint32 source_world_size = 3;
  uint32 destination_world_size = 4;
  uint32 world_size = 5;
  bytes roster_digest = 6;
  bytes config_digest = 7;
  string publisher_participant_id = 8;
  M2nBootstrapState state = 9;
  int64 expires_at_ms = 10;
  string reason = 11;
  uint64 revision = 12;
}

message PublishM2nBootstrapRequest {
  M2nBootstrapKey key = 1;
  bytes nccl_unique_id = 2;
  uint32 source_world_size = 3;
  uint32 destination_world_size = 4;
  uint32 world_size = 5;
  bytes roster_digest = 6;
  bytes config_digest = 7;
  string publisher_participant_id = 8;
  uint64 ttl_ms = 9;
}

message PublishM2nBootstrapResponse {
  bool success = 1;
  string message = 2;
  M2nBootstrapRecord record = 3;
}

message GetM2nBootstrapRequest {
  M2nBootstrapKey key = 1;
}

message GetM2nBootstrapResponse {
  bool found = 1;
  M2nBootstrapRecord record = 2;
}

message AbortM2nBootstrapRequest {
  M2nBootstrapKey key = 1;
  string requested_by = 2;
  string reason = 3;
}

message AbortM2nBootstrapResponse {
  bool success = 1;
  string message = 2;
  M2nBootstrapRecord record = 3;
}
