# Azure single-job template for large-model P2P RDMA weight-transfer CI tests
# with tensor parallelism = 8 (vLLM).
#
# This manifest is intentionally pinned to the full-GPU A100b pool. Source and
# target each consume a whole 8-GPU node, so the job validates a realistic
# large-model TP shape while preserving cross-host IB transfer via anti-affinity.

---
apiVersion: batch/v1
kind: Job
metadata:
  name: ${JOB_NAME}
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: mx-p2p-worker
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: worker-registry
      nodeSelector:
        agentpool: a100b
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: mx-p2p-worker
              topologyKey: kubernetes.io/hostname
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: mx-p2p-worker
              topologyKey: agentpool
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: no-datadog
          operator: Exists
          effect: NoExecute
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 128Gi
      containers:
        - name: ${JOB_NAME}
          image: ${WORKER_IMAGE}
          imagePullPolicy: Always
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --model
            - "${MX_CI_MODEL}"
            - --load-format
            - mx
            - --tensor-parallel-size
            - "8"
            # Keep KV fixed and small so VRAM parity stays sensitive to
            # weight residency instead of vLLM auto-sizing cache around leaks.
            - --max-model-len
            - "1024"
            - --kv-cache-memory-bytes
            - "1073741824"
            - --enforce-eager
            - --trust-remote-code
            - --port
            - "${WORKER_PORT}"
          env:
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility"
            - name: VLLM_PLUGINS
              value: "modelexpress"
            - name: MX_SERVER_ADDRESS
              value: "mx-server:8000"
            - name: MX_CONTIGUOUS_REG
              value: "0"
            - name: MX_RDMA_NIC_PIN
              value: "auto"
            - name: UCX_RNDV_SCHEME
              value: "get_zcopy"
            - name: UCX_RNDV_THRESH
              value: "0"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          ports:
            - containerPort: ${WORKER_PORT}
          resources:
            requests:
              cpu: "32"
              memory: "128Gi"
              nvidia.com/gpu: "8"
              rdma/ib: "8"
            limits:
              nvidia.com/gpu: "8"
              rdma/ib: "8"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
          securityContext:
            capabilities:
              add: [IPC_LOCK]
