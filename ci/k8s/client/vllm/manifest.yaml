# P2P RDMA weight-transfer CI test — source + target Jobs only.
# The MX server (mx-server:8000) is persistent infrastructure deployed during
# vCluster setup via ci/k8s/mx-server.yaml.
#
# Flow:
#   mx-source  loads model from HF via DefaultStrategy, publishes metadata to
#              the MX server, and stays alive as a vLLM API server.
#   mx-target  initContainer polls the MX server until a READY source appears,
#              then the main container loads weights via RdmaStrategy (NIXL over
#              NVLink/RDMA) and starts its own vLLM API server.
#
# Environment variables substituted by the workflow (via envsubst before apply):
#   WORKER_IMAGE   — image built from examples/dynamo_p2p_transfer_k8s/Dockerfile
#   MX_CI_MODEL    — HuggingFace model id (default: meta-llama/Llama-3.2-3B)

---
# Source Job: loads model from HF (DefaultStrategy) and publishes READY.
apiVersion: batch/v1
kind: Job
metadata:
  name: mx-source
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: worker-registry
      tolerations:
        - key: kubernetes.io/arch
          value: arm64
          effect: NoSchedule
      containers:
        - name: mx-source
          image: ${WORKER_IMAGE}
          # Force re-pull on every pod creation so CI/dev iterations on the same
          # tag pick up freshly pushed images instead of the node's cached copy.
          imagePullPolicy: Always
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --model
            - "${MX_CI_MODEL}"
            - --load-format
            - mx
            - --tensor-parallel-size
            - "1"
            - --trust-remote-code
          env:
            - name: VLLM_PLUGINS
              value: "modelexpress"
            - name: MX_SERVER_ADDRESS
              value: "mx-server:8000"
            - name: MX_CONTIGUOUS_REG
              value: "0"
            - name: UCX_TLS
              value: "rc_x,rc,dc_x,dc,cuda_copy"
            - name: UCX_RNDV_SCHEME
              value: "get_zcopy"
            - name: UCX_RNDV_THRESH
              value: "0"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          resources:
            limits:
              nvidia.com/gpu: "1"
          securityContext:
            capabilities:
              add: [IPC_LOCK]
---
# Target Job: initContainer gates on READY source, then loads via RdmaStrategy.
apiVersion: batch/v1
kind: Job
metadata:
  name: mx-target
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: worker-registry
      tolerations:
        - key: kubernetes.io/arch
          value: arm64
          effect: NoSchedule
      initContainers:
        # Poll the MX gRPC server until a READY source appears.
        # Uses the same worker image (already has the modelexpress Python client).
        # Exits 0 once a READY source is found; exits 1 on timeout (fails the Job).
        - name: wait-for-source
          image: ${WORKER_IMAGE}
          imagePullPolicy: Always
          command: ["python3", "-c"]
          args:
            - |
              import os, sys, time, grpc
              from modelexpress import p2p_pb2, p2p_pb2_grpc

              addr = os.environ["MX_SERVER_ADDRESS"]
              model = os.environ["MX_CI_MODEL"]
              timeout = int(os.environ.get("MX_CI_POLL_TIMEOUT", "300"))
              deadline = time.perf_counter() + timeout

              channel = grpc.insecure_channel(addr)
              stub = p2p_pb2_grpc.P2pServiceStub(channel)

              identity = p2p_pb2.SourceIdentity(
                  model_name=model,
                  backend_framework=p2p_pb2.BACKEND_FRAMEWORK_VLLM,
                  tensor_parallel_size=1,
                  pipeline_parallel_size=1,
              )

              while time.perf_counter() < deadline:
                  try:
                      resp = stub.ListSources(
                          p2p_pb2.ListSourcesRequest(
                              identity=identity,
                              status_filter=p2p_pb2.SOURCE_STATUS_READY,
                          ),
                          timeout=5,
                      )
                      if resp.instances:
                          print(f"Source READY: {resp.instances[0].mx_source_id}")
                          sys.exit(0)
                  except grpc.RpcError as e:
                      print(f"gRPC error: {e.details()}, retrying...")
                  print("No READY source yet, retrying in 5s...")
                  time.sleep(5)

              print(f"Timed out waiting for READY source after {timeout}s")
              sys.exit(1)
          env:
            - name: MX_SERVER_ADDRESS
              value: "mx-server:8000"
            - name: MX_CI_MODEL
              value: "${MX_CI_MODEL}"
            - name: MX_CI_POLL_TIMEOUT
              value: "300"
      containers:
        - name: mx-target
          image: ${WORKER_IMAGE}
          # Force re-pull on every pod creation so CI/dev iterations on the same
          # tag pick up freshly pushed images instead of the node's cached copy.
          imagePullPolicy: Always
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - --model
            - "${MX_CI_MODEL}"
            - --load-format
            - mx
            - --tensor-parallel-size
            - "1"
            - --trust-remote-code
            - --port
            - "8000"
          env:
            - name: VLLM_PLUGINS
              value: "modelexpress"
            - name: MX_SERVER_ADDRESS
              value: "mx-server:8000"
            - name: MX_CONTIGUOUS_REG
              value: "0"
            - name: UCX_TLS
              value: "rc_x,rc,dc_x,dc,cuda_copy"
            - name: UCX_RNDV_SCHEME
              value: "get_zcopy"
            - name: UCX_RNDV_THRESH
              value: "0"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: "1"
          securityContext:
            capabilities:
              add: [IPC_LOCK]
