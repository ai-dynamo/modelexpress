# Default values for ModelExpress Helm Chart
# ModelExpress is a high-performance model serving and management platform for AI/ML models
# This file contains the base configuration that can be overridden for different environments

replicaCount: 1

image:
  repository: nvcr.io/nvidia/ai-dynamo/modelexpress-server
  pullPolicy: IfNotPresent
  tag: "0.3.0"

imagePullSecrets:
  - name: nvcr-secret
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""
  automount: false
  rbac:
    # Enable Role + RoleBinding for the Kubernetes metadata backend.
    # Required when MX_METADATA_BACKEND=kubernetes.
    enabled: false

podAnnotations: {}

podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  # fsGroup: 2000

securityContext:
  runAsNonRoot: true
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8001

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 256Mi
    ephemeral-storage: 1Gi
  requests:
    cpu: 200m
    memory: 128Mi
    ephemeral-storage: 256Mi

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /root

env:
  MODEL_EXPRESS_SERVER_PORT: "8001"
  MODEL_EXPRESS_LOGGING_LEVEL: "info"
  MODEL_EXPRESS_CACHE_DIRECTORY: "/root"
  # Distributed backend selection. Required — the server fails to start without it.
  # Set MX_METADATA_BACKEND to "redis" or "kubernetes"; it drives both the P2P metadata
  # store and the model registry.
  #
  # When "redis": also set REDIS_URL to your cluster's Redis service (e.g.
  # "redis://redis.default.svc:6379"). The chart does not bundle a Redis sub-chart.
  # When "kubernetes": apply examples/crds.yaml as a cluster-admin and set
  # serviceAccount.rbac.enabled=true to grant the server access to the CRDs.
  #
  # MX_METADATA_BACKEND: "redis"
  # REDIS_URL: "redis://redis.default.svc:6379"

livenessProbe:
  enabled: true
  tcpSocket:
    port: 8001
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  tcpSocket:
    port: 8001
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
nodeSelector: {}
tolerations: []
affinity: {}
# Additional volume mounts
extraVolumeMounts: []
# Additional volumes
extraVolumes: []
# Additional environment variables
# To enable HuggingFace model downloads (private/gated models), create a secret and uncomment:
#   kubectl create secret generic hf-token-secret --from-literal=HF_TOKEN=<your-token>
# To enable NGC model downloads, create a secret and uncomment:
#   kubectl create secret generic ngc-api-key-secret --from-literal=NGC_API_KEY=<your-key>
# extraEnv:
#   - name: HF_TOKEN
#     valueFrom:
#       secretKeyRef:
#         name: hf-token-secret
#         key: HF_TOKEN
#   - name: NGC_API_KEY
#     valueFrom:
#       secretKeyRef:
#         name: ngc-api-key-secret
#         key: NGC_API_KEY
extraEnv: []
# Additional container arguments
args: []
# Additional container command
command: []
