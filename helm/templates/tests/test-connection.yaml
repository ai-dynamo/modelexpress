apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "modelexpress.fullname" . }}-test-connection"
  labels:
    {{- include "modelexpress.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
  - name: grpc-health-probe
    image: registry.k8s.io/grpc-health-probe:v0.4.35
    command: ['grpc_health_probe']
    args: ['-addr={{ include "modelexpress.fullname" . }}:{{ .Values.service.port | default 8001 }}']
  restartPolicy: Never
