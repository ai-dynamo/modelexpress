services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: unless-stopped

  model-express-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - MODEL_EXPRESS_SERVER_PORT=8001
      - MODEL_EXPRESS_LOG_LEVEL=info
      - MX_METADATA_BACKEND=redis
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped
