# TP=2 source pool using the dht metadata backend, bootstrapped with the
# self-organizing K8s Leases anchor (OPTION A).
#
# No central server, no Redis, no CRDs, and no Service in the data path.
# Workers discover each other over a libp2p Kademlia mesh: each one sets
# MX_METADATA_BACKEND=dht, listens on MX_DHT_LISTEN, and bootstraps into
# the mesh through a self-electing anchor quorum.
#
# The anchor quorum self-elects over coordination.k8s.io Leases named with
# the MX_DHT_BOOTSTRAP_LEASES prefix - there are no dedicated anchor pods.
# The workers themselves take the anchor Leases; whichever ones hold them
# publish their dialable address for joiners to bootstrap against. POD_IP,
# taken from the downward API, is the address an anchor publishes into its
# Lease so peers can reach it. This gives a pre-converged anchor set so a
# large simultaneous worker cold-start does not stall waiting for a seed.
#
# One publisher per (mx_source_id, rank): a single TP=2 source pod runs
# both ranks under one mx_source_id, so it is the sole publisher for each.
# The dht backend does not model a load-balanced pool of replicas for a
# single rank; for that shape use the k8s-service or central-coordinator
# backends. See ../../docs/DHT_BACKEND.md.
#
# Prerequisites:
#   - Lease RBAC applied: kubectl apply -f lease-rbac.yaml
#   - HF token secret:  kubectl create secret generic hf-token-secret --from-literal=HF_TOKEN=<token>
#   - RDMA-capable NICs available on the nodes (rdma/shared_ib)
#   - Pin the revision via MX_MODEL_REVISION so mx_source_id is content-addressed

# ---------------------------------------------------------------------------
# TP=2 source (multi-GPU-per-pod).
#
# One pod, two GPUs, vLLM --tensor-parallel-size=2. The pod's two ranks
# publish /mx/{mx_source_id}/rank/0 and /mx/{mx_source_id}/rank/1 into the
# mesh. Cross-node TP (Ray / torchrun spanning pods) keeps the same dht env
# and populates each rank from its runtime; this example stays single-pod
# for clarity. NVLink is intra-node only, so multi-GPU-per-pod is the usual
# production TP shape.
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mx-dht-source
  labels:
    app: mx-dht
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mx-dht
      role: source
  template:
    metadata:
      labels:
        app: mx-dht
        role: source
    spec:
      # Grants the workers get/update/patch on coordination.k8s.io Leases so
      # the anchor quorum can self-elect. See lease-rbac.yaml.
      serviceAccountName: mx-dht
      containers:
        - name: vllm
          image: nvcr.io/nvidian/dynamo-dev/modelexpress-client:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          env:
            - name: MODEL_NAME
              value: "deepseek-ai/DeepSeek-V3"
            # Pin the model revision so mx_source_id is content-addressed.
            # Replace with the exact HuggingFace commit SHA you intend to serve.
            - name: MX_MODEL_REVISION
              value: "REPLACE_WITH_COMMIT_SHA"
            - name: VLLM_PLUGINS
              value: "modelexpress"

            # Backend selection: decentralized Kademlia DHT.
            - name: MX_METADATA_BACKEND
              value: "dht"
            # Listen address for this node's DHT participation.
            - name: MX_DHT_LISTEN
              value: "0.0.0.0:4001"
            # Self-organizing anchor bootstrap: the anchor quorum self-elects
            # over Leases with this name-prefix. No dedicated anchor pods.
            - name: MX_DHT_BOOTSTRAP_LEASES
              value: "mx-dht-anchor"
            # POD_IP is the dialable address an anchor publishes into its Lease.
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

            # NIXL listen port and WorkerGrpcServer port for the P2P data path.
            - name: MX_METADATA_PORT
              value: "5555"
            - name: MX_WORKER_GRPC_PORT
              value: "6555"
            - name: NIXL_LOG_LEVEL
              value: "INFO"

            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          args:
            - --model
            - $(MODEL_NAME)
            - --load-format
            - modelexpress
            - --tensor-parallel-size
            - "2"
          ports:
            - name: kademlia
              containerPort: 4001
            - name: worker-grpc
              containerPort: 6555
          resources:
            limits:
              nvidia.com/gpu: "2"
              rdma/shared_ib: "1"
            requests:
              nvidia.com/gpu: "2"
              rdma/shared_ib: "1"
          readinessProbe:
            # Ready once the WorkerGrpcServer is serving tensor manifests.
            exec:
              command:
                - /bin/grpc_health_probe
                - -addr=:6555
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
