# TP=2 source pool using the dht metadata backend, bootstrapped against the
# dedicated seed quorum (OPTION B).
#
# No central server, no Redis, no CRDs, and no Service in the data path.
# Workers discover each other over a libp2p Kademlia mesh: each one sets
# MX_METADATA_BACKEND=dht, listens on MX_DHT_LISTEN, and bootstraps into the
# mesh by dialing the seed quorum's headless Service (see seed-quorum.yaml).
# No Lease RBAC and no ServiceAccount are needed on the workers - the seeds
# are the pre-converged anchor set.
#
# One publisher per (mx_source_id, rank): a single TP=2 source pod runs
# both ranks under one mx_source_id, so it is the sole publisher for each.
# The dht backend does not model a load-balanced pool of replicas for a
# single rank; for that shape use the k8s-service or central-coordinator
# backends. See ../../../docs/DHT_BACKEND.md.
#
# Prerequisites:
#   - Seed quorum applied and converged: kubectl apply -f seed-quorum.yaml
#   - HF token secret:  kubectl create secret generic hf-token-secret --from-literal=HF_TOKEN=<token>
#   - RDMA-capable NICs available on the nodes (rdma/shared_ib)
#   - Pin the revision via MX_MODEL_REVISION so mx_source_id is content-addressed

# ---------------------------------------------------------------------------
# TP=2 source (multi-GPU-per-pod).
#
# One pod, two GPUs, vLLM --tensor-parallel-size=2. The pod's two ranks
# publish /mx/{mx_source_id}/rank/0 and /mx/{mx_source_id}/rank/1 into the
# mesh. Cross-node TP (Ray / torchrun spanning pods) keeps the same dht env
# and populates each rank from its runtime; this example stays single-pod
# for clarity. NVLink is intra-node only, so multi-GPU-per-pod is the usual
# production TP shape.
# ---------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mx-dht-source
  labels:
    app: mx-dht
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mx-dht
      role: source
  template:
    metadata:
      labels:
        app: mx-dht
        role: source
    spec:
      containers:
        - name: vllm
          image: nvcr.io/nvidian/dynamo-dev/modelexpress-client:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          env:
            - name: MODEL_NAME
              value: "deepseek-ai/DeepSeek-V3"
            # Pin the model revision so mx_source_id is content-addressed.
            # Replace with the exact HuggingFace commit SHA you intend to serve.
            - name: MX_MODEL_REVISION
              value: "REPLACE_WITH_COMMIT_SHA"
            - name: VLLM_PLUGINS
              value: "modelexpress"

            # Backend selection: decentralized Kademlia DHT.
            - name: MX_METADATA_BACKEND
              value: "dht"
            # Listen address for this node's DHT participation.
            - name: MX_DHT_LISTEN
              value: "0.0.0.0:4001"
            # Bootstrap into the mesh via the seed quorum's headless Service.
            # Its DNS resolves to every seed pod IP; each is dialed at
            # MX_DHT_BOOTSTRAP_PORT.
            - name: MX_DHT_BOOTSTRAP_DNS
              value: "mx-dht-seed.${NAMESPACE}.svc.cluster.local"
            - name: MX_DHT_BOOTSTRAP_PORT
              value: "4001"

            # NIXL listen port and WorkerGrpcServer port for the P2P data path.
            - name: MX_METADATA_PORT
              value: "5555"
            - name: MX_WORKER_GRPC_PORT
              value: "6555"
            - name: NIXL_LOG_LEVEL
              value: "INFO"

            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          args:
            - --model
            - $(MODEL_NAME)
            - --load-format
            - modelexpress
            - --tensor-parallel-size
            - "2"
          ports:
            - name: kademlia
              containerPort: 4001
            - name: worker-grpc
              containerPort: 6555
          resources:
            limits:
              nvidia.com/gpu: "2"
              rdma/shared_ib: "1"
            requests:
              nvidia.com/gpu: "2"
              rdma/shared_ib: "1"
          readinessProbe:
            # Ready once the WorkerGrpcServer is serving tensor manifests.
            exec:
              command:
                - /bin/grpc_health_probe
                - -addr=:6555
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
