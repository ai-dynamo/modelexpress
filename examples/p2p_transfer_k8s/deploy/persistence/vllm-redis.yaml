# vLLM Instance with ModelExpress P2P weight transfer support.
# Uses Redis backend for metadata (legacy/alternative to Kubernetes CRD backend).
# For Kubernetes-native deployments, use vllm-kubernetes.yaml (CRD backend) instead.
#
# On startup, the mx loader queries the MX server:
#   - If a ready source exists for this model -> receive weights via RDMA
#   - If no source is available -> load weights from disk
# Either way, the node registers with NIXL and publishes metadata so
# future nodes can discover it as a source.
apiVersion: v1
kind: Service
metadata:
  name: mx-vllm
  labels:
    app: mx-vllm
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: mx-vllm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mx-vllm
  labels:
    app: mx-vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mx-vllm
  template:
    metadata:
      labels:
        app: mx-vllm
    spec:
      containers:
        - name: vllm
          image: nvcr.io/nvidian/dynamo-dev/modelexpress-client:latest
          imagePullPolicy: IfNotPresent
          # Needed for GPUDirect RDMA to work.
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          env:
            # Increase startup timeout to allow DeepGemm warmup to complete (2 hours)
            - name: VLLM_RPC_TIMEOUT
              value: "7200000"
            - name: HF_HUB_CACHE
              value: "/models"
            - name: MODEL_NAME
              value: "deepseek-ai/DeepSeek-V3"
            # Register ModelExpress loaders via vLLM plugin system
            - name: VLLM_PLUGINS
              value: "modelexpress"
            # Server address for metadata publishing
            - name: MX_SERVER_ADDRESS
              value: "modelexpress-server:8001"
            # OPTIMIZATION: Synchronized publish - wait for all workers before publishing
            - name: MX_SYNC_PUBLISH
              value: "1"
            - name: MX_EXPECTED_WORKERS
              value: "8"
            # Metadata backend: Redis
            - name: MX_METADATA_BACKEND
              value: "redis"
            # Redis backend configuration
            - name: MX_REDIS_HOST
              value: "modelexpress-server"
            # Baseline: individual tensor registration (stable and tested)
            # Set to "1" for contiguous regions (experimental - see docs/CONTIGUOUS_CONTEXT.md)
            - name: MX_CONTIGUOUS_REG
              value: "0"
            # Logging (set to DEBUG for troubleshooting)
            - name: NIXL_LOG_LEVEL
              value: "INFO"
            - name: UCX_LOG_LEVEL
              value: "INFO"
            # UCX transport settings for GPUDirect RDMA
            - name: UCX_TLS
              value: "rc_x,rc,dc_x,dc,cuda_copy"
            - name: UCX_RNDV_SCHEME
              value: "get_zcopy"
            - name: UCX_RNDV_THRESH
              value: "0"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          args:
            - --model
            - $(MODEL_NAME)
            - --load-format
            - mx
            - --tensor-parallel-size
            - "8"
            - --enable-expert-parallel
          resources:
            limits:
              nvidia.com/gpu: "8"
              rdma/ib: "8"
            requests:
              nvidia.com/gpu: "8"
              rdma/ib: "8"
              memory: "200Gi"
              cpu: "16"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: model-cache
              mountPath: /models

      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 64Gi
        # Model cache PVC - needed in case this node loads from disk
        - name: model-cache
          persistentVolumeClaim:
            claimName: deepseek-v3-block
      imagePullSecrets:
        - name: nvcr-imagepullsecret
