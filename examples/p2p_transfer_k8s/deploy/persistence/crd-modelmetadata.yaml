#
# ModelMetadata CRD for ModelExpress P2P transfers
# This CRD stores NIXL metadata and coordination state as an alternative to Redis
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: modelmetadatas.modelexpress.nvidia.com
  labels:
    app.kubernetes.io/name: modelexpress
    app.kubernetes.io/component: crd
spec:
  group: modelexpress.nvidia.com
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - modelName
              properties:
                modelName:
                  type: string
                  description: Full model name (e.g., deepseek-ai/DeepSeek-V3)
            status:
              type: object
              properties:
                workers:
                  type: array
                  description: Per-worker NIXL metadata and readiness state
                  items:
                    type: object
                    required:
                      - workerRank
                    properties:
                      workerRank:
                        type: integer
                        description: Worker rank (0-indexed)
                      nixlMetadata:
                        type: string
                        format: byte
                        description: Base64-encoded NIXL agent metadata blob
                      tensorCount:
                        type: integer
                        description: Number of tensors registered by this worker
                      tensorConfigMap:
                        type: string
                        description: Name of ConfigMap containing tensor descriptors
                      status:
                        type: string
                        description: Worker lifecycle status
                        enum:
                          - Unknown
                          - Initializing
                          - Ready
                          - Stale
                        default: Unknown
                      updatedAt:
                        type: string
                        format: date-time
                        description: Timestamp of last status update (RFC3339)
                conditions:
                  type: array
                  description: Conditions for ModelMetadata lifecycle
                  items:
                    type: object
                    required:
                      - type
                      - status
                    properties:
                      type:
                        type: string
                        description: Condition type
                        enum:
                          - AllWorkersPublished
                          - Ready
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      reason:
                        type: string
                        description: Machine-readable reason for condition
                      message:
                        type: string
                        description: Human-readable message
                      lastTransitionTime:
                        type: string
                        format: date-time
                observedGeneration:
                  type: integer
                  format: int64
                  description: Generation observed by the controller
                publishedAt:
                  type: string
                  format: date-time
                  description: Timestamp when first worker published
      additionalPrinterColumns:
        - name: Model
          type: string
          description: Model name
          jsonPath: .spec.modelName
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
  scope: Namespaced
  names:
    plural: modelmetadatas
    singular: modelmetadata
    kind: ModelMetadata
    shortNames:
      - mxmeta
      - mm
