# Redis write-through test - uses external Redis (redis-standalone.yaml) for persistence
# Deploy redis-standalone.yaml first!
apiVersion: v1
kind: Service
metadata:
  name: modelexpress-server
  labels:
    app: modelexpress-server
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      name: grpc
  selector:
    app: modelexpress-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modelexpress-server
  labels:
    app: modelexpress-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modelexpress-server
  template:
    metadata:
      labels:
        app: modelexpress-server
    spec:
      containers:
        - name: modelexpress-server
          image: nvcr.io/nvidian/dynamo-dev/modelexpress-server:layered-test
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          env:
            - name: MX_METADATA_BACKEND
              value: "redis"
            - name: REDIS_URL
              value: "redis://redis:6379"
          resources:
            requests: { cpu: 2, memory: 4Gi }
          livenessProbe:
            tcpSocket: { port: 8001 }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket: { port: 8001 }
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: nvcr-imagepullsecret
