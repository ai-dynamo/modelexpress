# vLLM Target for metadata testing (Qwen 0.5B, TP=1, gRPC backend)
apiVersion: v1
kind: Service
metadata:
  name: mx-target
  namespace: metadata
  labels:
    app: mx-target
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: mx-target
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mx-target
  namespace: metadata
  labels:
    app: mx-target
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mx-target
  template:
    metadata:
      labels:
        app: mx-target
    spec:
      containers:
        - name: vllm
          image: nvcr.io/nvidian/dynamo-dev/modelexpress-client:metadata-test
          imagePullPolicy: Always
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          env:
            - name: VLLM_SERVER_DEV_MODE
              value: "1"
            - name: HF_HUB_CACHE
              value: "/models"
            - name: MODEL_NAME
              value: "Qwen/Qwen2.5-0.5B"
            - name: MX_REGISTER_LOADERS
              value: "1"
            - name: MX_SERVER_ADDRESS
              value: "modelexpress-server:8001"
            - name: MX_EXPECTED_WORKERS
              value: "1"
            - name: NIXL_LOG_LEVEL
              value: "INFO"
            - name: UCX_LOG_LEVEL
              value: "WARN"
            - name: UCX_TLS
              value: "rc_x,rc,dc_x,dc,cuda_copy"
            - name: UCX_RNDV_SCHEME
              value: "get_zcopy"
            - name: UCX_RNDV_THRESH
              value: "0"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          command: ["bash", "-c"]
          args:
            - |
              exec python3 -m vllm.entrypoints.openai.api_server \
                --model $MODEL_NAME \
                --load-format mx-target \
                --tensor-parallel-size 1
          resources:
            limits:
              nvidia.com/gpu: "1"
              rdma/ib: "1"
            requests:
              nvidia.com/gpu: "1"
              rdma/ib: "1"
              memory: "16Gi"
              cpu: "4"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: model-cache
              mountPath: /models
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
        - name: model-cache
          emptyDir:
            sizeLimit: 10Gi
      imagePullSecrets:
        - name: nvcr-imagepullsecret
