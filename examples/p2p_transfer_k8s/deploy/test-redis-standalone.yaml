# Standalone Redis for hydration testing (data survives MX server pod restarts)
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: metadata
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: metadata
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["--appendonly", "yes", "--dir", "/data"]
          ports:
            - containerPort: 6379
          resources:
            limits: { cpu: "1", memory: 2Gi }
            requests: { cpu: 250m, memory: 512Mi }
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            tcpSocket: { port: 6379 }
            periodSeconds: 10
          readinessProbe:
            tcpSocket: { port: 6379 }
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: redis-data
          emptyDir:
            sizeLimit: 1Gi
