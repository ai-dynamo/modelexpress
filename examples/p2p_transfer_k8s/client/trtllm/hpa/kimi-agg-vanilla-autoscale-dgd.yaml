# Aggregated Kimi K2.5 worker DGD for the vanilla Dynamo TRT-LLM autoscaling baseline.
#
# This intentionally mirrors kimi-agg-autoscale-dgd.yaml while removing ModelExpress:
#   - no ModelExpress metadata service
#   - no --model-express-url argument
#   - no MODEL_EXPRESS_URL / MX metadata env
#   - base Dynamo TRT-LLM runtime image instead of the MX-patched image
#
# Each replica is a TP=8 group across 2 nodes x 4 GPUs. On scale-up, every new
# replica loads model weights from disk/PVC, which is the baseline we compare
# against MX P2P weight transfer.
#
# Apply only when you are ready to run the vanilla baseline:
#   kubectl apply -n <namespace> -f kimi-agg-vanilla-autoscale-dgd.yaml
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kimi-agg-vanilla-autoscale-config
data:
  agg.yaml: |
    otlp_traces_endpoint: "http://10.57.209.4:4317"
    allreduce_strategy: MNNVL
    max_num_tokens: 131072
    enable_chunked_prefill: true
    cuda_graph_config:
      batch_sizes:
      - 1
      - 2
      - 4
      - 8
      - 16
      - 32
      - 64
      - 128
      enable_padding: true
    enable_attention_dp: false
    kv_cache_config:
      dtype: fp8
      enable_block_reuse: true
      free_gpu_memory_fraction: 0.75
      tokens_per_block: 32
    max_batch_size: 128
    max_seq_len: 256000
    moe_config:
      backend: TRTLLM
      max_num_tokens: 2048
      use_low_precision_moe_combine: true
    moe_expert_parallel_size: 8
    nvfp4_gemm_config:
      allowed_backends:
      - cutlass
      - cublaslt
      - cuda_core
    num_postprocess_workers: 8
    print_iter_log: true
    stream_interval: 10
    tensor_parallel_size: 8
    trust_remote_code: true
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: kimi-agg-vanilla-autoscale
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      extraPodSpec:
        schedulerName: default-scheduler
        containers: null
        imagePullSecrets:
          - name: nvcr-imagepullsecret
        mainContainer:
          image: "nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.1.0-dev.3"
          imagePullPolicy: IfNotPresent
          command:
            - python3
          args:
            - -m
            - dynamo.frontend
            - --router-mode
            - kv
            - --router-reset-states
            - --active-prefill-tokens-threshold
            - "1000000000"
            - --active-decode-blocks-threshold
            - "100"
            - --active-prefill-tokens-threshold-frac
            - "100"
            - --http-port
            - "8000"
            - --discovery-backend
            - kubernetes
            - --request-plane
            - nats
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: HF_HOME
              value: /model-cache
            - name: OTEL_SERVICE_NAME
              value: "dynamo-frontend-kimi-agg-vanilla-autoscale"
            - name: NATS_SERVER
              value: "nats://dynamo-platform-nats.saperiyasamy.svc.cluster.local:4222"
            - name: ETCD_ENDPOINTS
              value: "dynamo-platform-etcd.saperiyasamy.svc.cluster.local:2379"
          startupProbe:
            failureThreshold: 60
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - mountPath: /model-cache
              name: model-cache
        nodeSelector:
          cloud.google.com/gke-nodepool: customer-cpu
        tolerations:
          - effect: NoSchedule
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoExecute
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Exists
          - effect: NoSchedule
            key: kubernetes.io/arch
            operator: Exists
          - effect: NoSchedule
            key: node.kubernetes.io/unreachable
            operator: Exists
        volumes:
          - name: model-cache
            persistentVolumeClaim:
              claimName: shared-model-cache

    source:
      componentType: worker
      envFromSecret: hf-token-secret
      multinode:
        nodeCount: 2
      replicas: 1
      scalingAdapter:
        enabled: true
      resources:
        limits:
          gpu: "4"
        claims:
          - name: compute-domain-channel
      extraPodSpec:
        schedulerName: default-scheduler
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        securityContext: {}
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: cloud.google.com/gke-nodepool
                  operator: In
                  values:
                  - customer-gpu-o7v
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/part-of
                  operator: In
                  values:
                  - kimi-agg-vanilla-autoscale
              topologyKey: nvidia.com/gpu.clique
        containers: null
        imagePullSecrets:
          - name: nvcr-imagepullsecret
        mainContainer:
          image: "nvcr.io/nvidia/ai-dynamo/tensorrtllm-runtime:1.1.0-dev.3"
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/
          securityContext:
            privileged: true
          command:
            - python3
            - -m
            - dynamo.trtllm
          args:
            - --model-path
            - nvidia/Kimi-K2.5-NVFP4
            - --served-model-name
            - nvidia/Kimi-K2.5-NVFP4
            - --extra-engine-args
            - /config/agg.yaml
            - --tensor-parallel-size
            - "8"
            - --discovery-backend
            - kubernetes
            - --request-plane
            - nats
            - --publish-events-and-metrics
            - --dyn-reasoning-parser
            - kimi_k25
            - --dyn-tool-call-parser
            - kimi_k2
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: NATS_SERVER
              value: "nats://dynamo-platform-nats.saperiyasamy.svc.cluster.local:4222"
            - name: ETCD_ENDPOINTS
              value: "dynamo-platform-etcd.saperiyasamy.svc.cluster.local:2379"
            - name: MODEL_NAME
              value: "nvidia/Kimi-K2.5-NVFP4"
            - name: WORLD_SIZE
              value: "8"
            - name: HOME
              value: "/tmp"
            - name: HF_HOME
              value: /model-cache
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: HF_MODULES_CACHE
              value: /tmp/hf_modules
            - name: TRITON_CACHE_DIR
              value: /model-cache/.triton-cache
            - name: TRTLLM_UCX_INTERFACE
              value: "eth0"
            - name: UCX_TLS
              value: "self,sm,rc,cuda_copy,gdr_copy,tcp"
            - name: UCX_IB_GID_INDEX
              value: "3"
            - name: OMPI_MCA_pml
              value: "ob1"
            - name: OMPI_MCA_btl
              value: "tcp,self,vader"
            - name: OMPI_MCA_btl_tcp_if_include
              value: "eth0"
            - name: OMPI_MCA_oob_tcp_if_include
              value: "eth0"
            - name: NCCL_NET_PLUGIN
              value: "none"
            - name: NCCL_CUMEM_ENABLE
              value: "1"
            - name: NCCL_NVLS_ENABLE
              value: "1"
            - name: NVIDIA_GDRCOPY
              value: "1"
            - name: NCCL_SOCKET_IFNAME
              value: eth0
            - name: GLOO_SOCKET_IFNAME
              value: eth0
            - name: NCCL_STORE_TIMEOUT
              value: "7200"
            - name: TRTLLM_MOE_ENABLE_ALLTOALL_WITHOUT_ALLGATHER
              value: "1"
            - name: TRTLLM_ENABLE_PDL
              value: "1"
            - name: TLLM_SPEC_DECODE_FORCE_NUM_ACCEPTED_TOKENS
              value: "2"
            - name: TRTLLM_SERVER_DISABLE_GC
              value: "1"
            - name: TRTLLM_WORKER_DISABLE_GC
              value: "1"
            - name: NCCL_GRAPH_MIXING_SUPPORT
              value: "0"
            - name: NCCL_MAX_NCHANNELS
              value: "2"
            - name: ENABLE_CONFIGURABLE_MOE
              value: "1"
            - name: TLLM_LOG_LEVEL
              value: "INFO"
            - name: TLLM_OVERRIDE_LAYER_NUM
              value: "61"
            - name: OTEL_SERVICE_NAME
              value: "dynamo-agg-kimi-vanilla-autoscale"
            - name: DYN_REASONING_PARSER
              value: "kimi_k25"
            - name: DYN_TOOL_CALL_PARSER
              value: "kimi_k2"
          startupProbe:
            failureThreshold: 240
            httpGet:
              path: /live
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              ephemeral-storage: "50Gi"
              nvidia.com/gpu: "4"
            limits:
              ephemeral-storage: "50Gi"
              nvidia.com/gpu: "4"
          volumeMounts:
            - mountPath: /dev/infiniband
              name: infiniband
            - mountPath: /run/sshd
              name: sshd-run
            - mountPath: /model-cache
              name: model-cache
            - mountPath: /config
              name: trtllm-config
              readOnly: true
        nodeSelector:
          kubernetes.io/arch: arm64
        tolerations:
          - effect: NoSchedule
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoExecute
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Exists
          - effect: NoSchedule
            key: kubernetes.io/arch
            operator: Exists
          - effect: NoSchedule
            key: node.kubernetes.io/unreachable
            operator: Exists
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: zheng-compute-domain-channel-o7v
        volumes:
          - name: infiniband
            hostPath:
              path: /dev/infiniband
              type: Directory
          - name: sshd-run
            hostPath:
              path: /run/sshd
              type: DirectoryOrCreate
          - name: model-cache
            persistentVolumeClaim:
              claimName: shared-model-cache
          - name: trtllm-config
            configMap:
              name: kimi-agg-vanilla-autoscale-config
