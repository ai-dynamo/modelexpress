# Autoscaling glue for kimi-agg-autoscale DGD.
#
# DynamoGraphDeploymentScalingAdapter (DGDSA) wraps a single service
# inside the DGD and exposes the Kubernetes `scale` subresource. HPA
# can then drive `dgdsa.spec.replicas`, and the DGDSA controller
# propagates the value to the DGD's `spec.services.<name>.replicas`.
#
# When HPA scales up:
#   - DGD operator creates a new TP=8 replica group
#   - New pods auto-detect existing MX source via `_has_existing_sources()`
#   - Weights arrive via NIXL RDMA in ~1-2s per rank instead of ~20 min disk load
#
# Apply AFTER the DGD has `source.scalingAdapter.enabled: true` and the
# first replica is fully ready (1/1, all 8 workers published to
# ModelMetadata), otherwise scale-ups will fall back to disk loading.
---
# HPA targets the DGDSA's scale subresource.
# Raw CPU average is a placeholder metric for the demo. The TRT-LLM
# pods request GPUs but do not request CPU, so percentage utilization
# cannot be computed by HPA. In production, use a Prometheus adapter and
# scale on TRT-LLM queue depth, request rate, or P99 latency for better
# signal on a GPU-bound workload.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kimi-agg-autoscale
spec:
  scaleTargetRef:
    apiVersion: nvidia.com/v1alpha1
    kind: DynamoGraphDeploymentScalingAdapter
    name: kimi-agg-autoscale-source
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: AverageValue
          averageValue: 6800m
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
