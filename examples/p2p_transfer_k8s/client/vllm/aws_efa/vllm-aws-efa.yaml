# Single-node vLLM deployment on AWS EFA with the libfabric NIXL backend.
# Same shape as ../vllm-single-node.yaml,
# with the EFA-specific delta:
#   - vpc.amazonaws.com/efa resource for the AWS EFA device plugin
#   - MX_NIXL_BACKEND=LIBFABRIC selects the libfabric NIXL plugin; the
#     default UCX can silently fall back to TCP on EFA
#   - FI_PROVIDER=efa + FI_EFA_* env vars steer libfabric onto the EFA fabric
#   - IPC_LOCK lets libfabric pin pages for RDMA registration
#
# replicas=1 loads the model from HuggingFace and registers as a P2P source.
# Scale to N>=2 (kubectl scale deploy/mx-vllm-aws-efa --replicas=2) for new
# replicas to pull weights from existing replicas over EFA via NIXL.
#
# Prerequisites:
#   - ModelExpress server deployed (see ../../server/)
#   - AWS EKS / dgxc-k8s cluster with EFA-capable nodes (p5.48xlarge, p6e-gb200.36xlarge, ...)
#   - aws-efa-k8s-device-plugin DaemonSet running (exposes vpc.amazonaws.com/efa resource)
#   - EFA driver >= 3.0.0g on the worker nodes
#   - nvidia-peermem kernel module loaded on the worker nodes (required for GPUDirect RDMA)
#   - kubectl create secret generic hf-token-secret --from-literal=HF_TOKEN=<token>
apiVersion: v1
kind: Service
metadata:
  name: mx-vllm-aws-efa
  labels:
    app: mx-vllm-aws-efa
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: mx-vllm-aws-efa
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mx-vllm-aws-efa
  labels:
    app: mx-vllm-aws-efa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mx-vllm-aws-efa
  template:
    metadata:
      labels:
        app: mx-vllm-aws-efa
    spec:
      containers:
        - name: vllm
          # Build via examples/p2p_transfer_k8s/client/vllm/aws_efa/Dockerfile.
          image: <your-registry>/modelexpress-aws-efa:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          env:
            - name: VLLM_RPC_TIMEOUT
              value: "7200000"
            - name: MODEL_NAME
              value: "deepseek-ai/DeepSeek-V4-Pro"
            # vLLM 0.23.0 recognizes --load-format modelexpress natively. For
            # older vLLM versions, add:
            # - name: VLLM_PLUGINS
            #   value: "modelexpress"
            - name: MX_SERVER_ADDRESS
              value: "modelexpress-server:8001"
            # Transfer compatible vLLM JIT caches after the source is healthy.
            - name: MX_ARTIFACT_TRANSFER
              value: "1"
            # Fixed ports for NIXL listen thread and worker gRPC server.
            - name: MX_METADATA_PORT
              value: "5555"
            - name: MX_WORKER_GRPC_PORT
              value: "6555"
            - name: NIXL_LOG_LEVEL
              value: "INFO"

            # --- AWS EFA / libfabric setup --------------------------------
            # Select the libfabric NIXL plugin instead of the default UCX.
            - name: MX_NIXL_BACKEND
              value: "LIBFABRIC"
            # Force libfabric onto the EFA provider; required on mixed-NIC
            # instances where libfabric might otherwise auto-select a
            # bonded Ethernet interface.
            - name: FI_PROVIDER
              value: "efa"
            # Use device-level RDMA (GPUDirect) rather than CPU-bounced
            # transfers. Requires nvidia-peermem on the host.
            - name: FI_EFA_USE_DEVICE_RDMA
              value: "1"
            # Disable libfabric's shared-memory transport so all cross-pod
            # traffic actually goes through the EFA NIC.
            - name: FI_EFA_ENABLE_SHM_TRANSFER
              value: "0"
            - name: FI_LOG_LEVEL
              value: "info"
            # --------------------------------------------------------------

            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          # The vllm-runtime-efa base image's entrypoint is the generic
          # nvidia_entrypoint.sh wrapper that just execs whatever is passed.
          # Spell out the vLLM CLI explicitly so args are routed correctly.
          command: ["vllm", "serve"]
          args:
            - $(MODEL_NAME)
            - --load-format
            - modelexpress
            - --tensor-parallel-size
            - "8"
            - --kv-cache-dtype
            - fp8
          ports:
            - name: http
              containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: 8
              # Number of EFA NICs to expose to the pod. p6e-gb200.36xlarge
              # has 4 EFA NICs per node; p5.48xlarge has 32. Pick a count
              # that matches what your workload can saturate.
              vpc.amazonaws.com/efa: 4
            requests:
              nvidia.com/gpu: 8
              vpc.amazonaws.com/efa: 4
