#
# Bench gRPC streaming server, Python implementation.
#
# Hosts the same `bench:<bytes>:<files>` ModelService that the Rust bench
# server exposes, so the existing Rust bench client targets it via the
# same chunk-size sweep machinery and we get cross-language numbers.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bench-grpc-server-python
  labels:
    app: bench-grpc-server-python
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bench-grpc-server-python
  template:
    metadata:
      labels:
        app: bench-grpc-server-python
    spec:
      restartPolicy: Always
      # Tolerate the standard NVIDIA GPU taint so the bench pod can land
      # on a GPU node and exercise the same fabric production traffic
      # uses. Add cluster-specific tolerations here if your nodes have
      # additional taints.
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: bench-server-python
          image: <your-registry>/modelexpress-bench-python:latest
          imagePullPolicy: IfNotPresent
          args:
            - --addr
            - "[::]:8001"
            - --max-workers
            - "16"
            - --source-buf-size
            - "16777216"
          ports:
            - containerPort: 8001
              name: grpc
          resources:
            requests:
              cpu: "2"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "2Gi"
        - name: iperf3-server
          image: <your-registry>/modelexpress-bench-python:latest
          imagePullPolicy: IfNotPresent
          command: ["/usr/bin/iperf3"]
          args: ["-s", "-p", "5201"]
          ports:
            - containerPort: 5201
              name: iperf3
          resources:
            requests:
              cpu: "1"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: bench-grpc-server-python
spec:
  selector:
    app: bench-grpc-server-python
  clusterIP: None
  ports:
    - name: grpc
      port: 8001
      targetPort: 8001
    - name: iperf3
      port: 5201
      targetPort: 5201
