#
# Bench client pinned to the SAME node as bench-grpc-server. Measures the
# loopback / CNI-veth path: pod-to-pod traffic that never leaves the node.
# The result is the userland tonic stack ceiling before the physical fabric
# is involved at all.
#
# Run directly with `kubectl apply -f`. The pod sleeps indefinitely so an
# operator can `kubectl exec` repeated invocations with different chunk sizes.
---
apiVersion: v1
kind: Pod
metadata:
  name: bench-grpc-client-same-node
  labels:
    app: bench-grpc-client
    topology: same-node
spec:
  restartPolicy: Never
  # Tolerate the standard NVIDIA GPU taint so the bench pod can land
  # on a GPU node and exercise the same fabric production traffic uses.
  # Add cluster-specific tolerations here if your nodes have additional taints.
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: bench-grpc-server
          topologyKey: kubernetes.io/hostname
  containers:
    - name: bench-client
      image: <your-registry>/modelexpress-bench:latest
      imagePullPolicy: IfNotPresent
      command:
        - /bin/bash
        - -c
        - |
          set -euo pipefail
          echo "bench-client pod ready on $(hostname)"
          echo "server pod IP: ${BENCH_SERVER_IP:-unset}"
          sleep infinity
      env:
        - name: BENCH_SERVER_IP
          value: ""  # populated by run.sh before exec
      resources:
        requests:
          cpu: "2"
          memory: "1Gi"
        limits:
          cpu: "4"
          memory: "2Gi"
