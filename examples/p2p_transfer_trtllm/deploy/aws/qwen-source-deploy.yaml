# Qwen 0.5B source — Dynamo engine test TP=2 on AWS GB200
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qwen-source-trtllm-config
data:
  aggregated.yaml: |
    max_num_tokens: 2048
    enable_chunked_prefill: true
    disable_overlap_scheduler: true
    enable_attention_dp: false
    cuda_graph_config: null
    kv_cache_config:
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.75
      tokens_per_block: 32
    max_batch_size: 8
    max_seq_len: 4096
    num_postprocess_workers: 1
    print_iter_log: true
    tensor_parallel_size: 2
    trust_remote_code: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen-source-deploy
  labels:
    app: qwen-source-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen-source-deploy
  template:
    metadata:
      labels:
        app: qwen-source-deploy
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        node-role.kubernetes.io/customer-gpu: ""
      tolerations:
        - key: dedicated
          operator: Equal
          value: user-workload
          effect: NoSchedule
        - key: dedicated
          operator: Equal
          value: user-workload
          effect: NoExecute
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: source
          image: nvcr.io/nvidian/dynamo-dev/kavink:dynamo-trtllm-mx-v1.5.0
          imagePullPolicy: Always
          securityContext:
            privileged: true
          command: ["python3", "-m", "dynamo.trtllm"]
          args:
            - --model-path
            - Qwen/Qwen2.5-0.5B
            - --served-model-name
            - Qwen/Qwen2.5-0.5B
            - --extra-engine-args
            - /config/aggregated.yaml
            - --model-express-url
            - modelexpress-server:8001
            - --model-express-role
            - source
            - --tensor-parallel-size
            - "2"
          env:
            - name: NATS_SERVER
              value: "nats://dynamo-platform-nats:4222"
            - name: ETCD_ENDPOINTS
              value: "dynamo-platform-etcd:2379"
            - name: MODEL_EXPRESS_URL
              value: "modelexpress-server:8001"
            - name: MODEL_NAME
              value: "Qwen/Qwen2.5-0.5B"
            - name: MODEL_EXPRESS_SOURCE
              value: "1"
            - name: WORLD_SIZE
              value: "2"
            - name: HF_HOME
              value: /tmp/hf_cache
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
            - name: NIXL_LOG_LEVEL
              value: "INFO"
            - name: UCX_LOG_LEVEL
              value: "WARN"
            - name: UCX_TLS
              value: "rc_v,rc_x,rc,dc_x,dc,cuda_copy,cuda_ipc,tcp"
            - name: NCCL_SOCKET_IFNAME
              value: eth0
            - name: GLOO_SOCKET_IFNAME
              value: eth0
          startupProbe:
            failureThreshold: 30
            httpGet:
              path: /live
              port: 9090
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            limits:
              nvidia.com/gpu: "2"
            requests:
              nvidia.com/gpu: "2"
              memory: "16Gi"
              cpu: "4"
          volumeMounts:
            - mountPath: /config
              name: trtllm-config
              readOnly: true
          workingDir: /workspace/
      volumes:
        - name: trtllm-config
          configMap:
            name: qwen-source-trtllm-config
      imagePullSecrets:
        - name: nvcr-imagepullsecret
