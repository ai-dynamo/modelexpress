# Kimi K2.5 planner-driven scaling via ModelExpress P2P
# DGD with: Frontend + Planner + Worker (MX target, scaled by planner)
# MX source runs separately (kimi-source-deploy.yaml) and holds GPU memory
# Namespace: kavin
#
# Validated: 369 Gbps RoCE, 648 GB in 3.51s (March 10, 2026)
#
# Prerequisites:
#   - MX source deployed and published (kimi-source-deploy.yaml)
#   - modelexpress-server + redis running
#   - model-cache PVC with Kimi model (for tokenizer files)
#   - Dynamo platform (etcd + NATS) in namespace
#   - DGD operator webhook running (kube-rbac-proxy fix applied)
#   - ComputeDomain 'kavin-compute-domain' created
#
# Usage:
#   kubectl -n kavin apply -f kimi-planner-dgd.yaml
#   # Workers load via P2P in ~3.5s, ready to serve in ~35s
#   # Planner adjusts worker replicas based on SLA metrics
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kimi-planner-trtllm-config
data:
  aggregated.yaml: |
    max_num_tokens: 8192
    enable_chunked_prefill: true
    disable_overlap_scheduler: true
    cuda_graph_config:
      max_batch_size: 8
      enable_padding: true
    enable_attention_dp: true
    kv_cache_config:
      dtype: fp8
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.75
      tokens_per_block: 32
    max_batch_size: 8
    max_seq_len: 256000
    model_kwargs:
      num_hidden_layers: 61
    moe_config:
      backend: TRTLLM
      use_low_precision_moe_combine: true
    moe_expert_parallel_size: 4
    num_postprocess_workers: 4
    print_iter_log: true
    stream_interval: 10
    tensor_parallel_size: 4
    trust_remote_code: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kimi-planner-profile-data
data:
  prefill_raw_data.json: |
    {
      "prefill_isl":          [128, 256, 512, 1024, 2048, 4096],
      "prefill_ttft":         [50,  80,  150, 300,  600,  1200],
      "prefill_thpt_per_gpu": [3200, 2800, 2200, 1600, 1000, 500]
    }
  decode_raw_data.json: |
    {
      "x_kv_usage":       [0.1, 0.3, 0.5, 0.7, 0.9],
      "y_context_length":  [128, 512, 1024, 2048, 4096],
      "z_itl": [
        [8,  10, 12, 16, 22],
        [9,  11, 14, 18, 25],
        [10, 13, 16, 21, 28],
        [12, 15, 19, 25, 33],
        [15, 19, 24, 32, 42]
      ],
      "z_thpt_per_gpu": [
        [1200, 1000, 800, 600, 400],
        [1100, 900,  720, 540, 360],
        [950,  780,  620, 460, 300],
        [800,  650,  510, 370, 240],
        [600,  480,  380, 270, 170]
      ],
      "max_kv_tokens": 530686
    }
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: kimi-planner
spec:
  services:
    Frontend:
      componentType: frontend
      replicas: 1
      extraPodSpec:
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        containers: null
        imagePullSecrets:
          - name: nvcr-imagepullsecret
        mainContainer:
          image: nvcr.io/nvidian/dynamo-dev/kavink:dynamo-trtllm-mx-v1.5.0
          command:
            - python3
          args:
            - -m
            - dynamo.frontend
            - --http-port
            - "8000"
            - --router-mode
            - round-robin
            - --request-plane
            - nats
          env:
            - name: NATS_SERVER
              value: "nats://dynamo-platform-nats.kavin.svc.cluster.local:4222"
            - name: ETCD_ENDPOINTS
              value: "dynamo-platform-etcd.kavin.svc.cluster.local:2379"
            - name: HF_HOME
              value: /model-cache
          volumeMounts:
            - mountPath: /model-cache
              name: model-cache
        nodeSelector:
          kubernetes.io/arch: arm64
        tolerations:
          - effect: NoSchedule
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoExecute
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Exists
          - effect: NoSchedule
            key: kubernetes.io/arch
            operator: Exists
        volumes:
          - name: model-cache
            persistentVolumeClaim:
              claimName: shared-model-cache

    Planner:
      componentType: planner
      replicas: 1
      extraPodSpec:
        containers: null
        imagePullSecrets:
          - name: nvcr-imagepullsecret
        mainContainer:
          image: nvcr.io/nvidian/dynamo-dev/kavink:dynamo-trtllm-mx-v1.5.0
          ports:
            - name: metrics
              containerPort: 9085
          command:
            - bash
            - -c
            - |
              CORE=$(python3 -c "import dynamo.planner.utils.planner_core as m; print(m.__file__)")
              AGG=$(python3 -c "import dynamo.planner.utils.agg_planner as m; print(m.__file__)")
              sed -i 's/start_prometheus_server: bool = True,/start_prometheus_server: bool = True,\n        component_type=None,/' "$CORE"
              sed -i '/^        self.config = config/a\        if component_type is not None:\n            self.component_type = component_type' "$CORE"
              sed -i 's/start_prometheus_server=True,$/start_prometheus_server=True,\n            component_type=SubComponentType.DECODE,/' "$AGG"
              sed -i '/Override: agg planner/,/self.planner.component_type/d' "$AGG"
              echo "Patched planner_core.py and agg_planner.py for component_type fix"
              exec python3 -m dynamo.planner --config '{"environment": "kubernetes", "backend": "trtllm", "mode": "agg", "throughput_adjustment_interval": 30, "ttft": 3000, "itl": 30, "enable_throughput_scaling": false, "enable_load_scaling": true}'
          env:
            - name: NATS_SERVER
              value: "nats://dynamo-platform-nats.kavin.svc.cluster.local:4222"
            - name: ETCD_ENDPOINTS
              value: "dynamo-platform-etcd.kavin.svc.cluster.local:2379"
          volumeMounts:
            - name: planner-profile-data
              mountPath: /workspace/profiling_results
              readOnly: true
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: cloud.google.com/gke-nodepool
                  operator: In
                  values:
                  - customer-gpu-w0e
                  - customer-gpu-o7v
        nodeSelector:
          kubernetes.io/arch: arm64
        tolerations:
          - effect: NoSchedule
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoExecute
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Exists
          - effect: NoSchedule
            key: kubernetes.io/arch
            operator: Exists
        volumes:
          - name: planner-profile-data
            configMap:
              name: kimi-planner-profile-data

    KimiWorker:
      componentType: worker
      subComponentType: decode
      envFromSecret: hf-token-secret
      scalingAdapter:
        enabled: true
      replicas: 1
      livenessProbe:
        httpGet:
          path: /live
          port: 9090
        periodSeconds: 30
        timeoutSeconds: 10
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /health
          port: 9090
        periodSeconds: 10
        timeoutSeconds: 30
        failureThreshold: 60
      resources:
        limits:
          gpu: "4"
        claims:
          - name: compute-domain-channel
      extraPodSpec:
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        terminationGracePeriodSeconds: 600
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: cloud.google.com/gke-nodepool
                  operator: In
                  values:
                  - customer-gpu-w0e
                  - customer-gpu-o7v
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - kimi-source-deploy
              topologyKey: nvidia.com/gpu.clique
        containers: null
        imagePullSecrets:
          - name: nvcr-imagepullsecret
        mainContainer:
          image: nvcr.io/nvidian/dynamo-dev/kavink:dynamo-trtllm-mx-v1.5.0
          imagePullPolicy: Always
          workingDir: /workspace/
          securityContext:
            privileged: true
          command:
            - python3
            - -m
            - dynamo.trtllm
          args:
            - --model-path
            - baseten-admin/Kimi-2.5-text-nvfp4-v3
            - --served-model-name
            - baseten-admin/Kimi-2.5-text-nvfp4-v3
            - --extra-engine-args
            - /config/aggregated.yaml
            - --model-express-url
            - modelexpress-server.kavin.svc.cluster.local:8001
            - --model-express-role
            - target
            - --tensor-parallel-size
            - "4"
            - --publish-events-and-metrics
            - --request-plane
            - nats
          env:
            - name: NATS_SERVER
              value: "nats://dynamo-platform-nats.kavin.svc.cluster.local:4222"
            - name: ETCD_ENDPOINTS
              value: "dynamo-platform-etcd.kavin.svc.cluster.local:2379"
            - name: MODEL_EXPRESS_URL
              value: "modelexpress-server.kavin.svc.cluster.local:8001"
            - name: MODEL_NAME
              value: "baseten-admin/Kimi-2.5-text-nvfp4-v3"
            - name: WORLD_SIZE
              value: "4"
            - name: HF_HOME
              value: /model-cache
            - name: TRITON_CACHE_DIR
              value: /model-cache/.triton-cache
            # UCX/NIXL — NO cuda_ipc (breaks on GB200)
            - name: NIXL_LOG_LEVEL
              value: "INFO"
            - name: UCX_LOG_LEVEL
              value: "WARN"
            - name: UCX_TLS
              value: "rc_v,rc_x,rc,dc_x,dc,cuda_copy,tcp"
            - name: UCX_RNDV_SCHEME
              value: "get_zcopy"
            - name: UCX_RNDV_THRESH
              value: "0"
            # MPI — force ob1 PML to avoid UCX UD timeout on GB200
            - name: OMPI_MCA_pml
              value: "ob1"
            - name: OMPI_MCA_btl
              value: "tcp,self,vader"
            - name: OMPI_MCA_btl_tcp_if_include
              value: "eth0"
            - name: OMPI_MCA_oob_tcp_if_include
              value: "eth0"
            # NCCL
            - name: NCCL_NET_PLUGIN
              value: "none"
            - name: NCCL_CUMEM_ENABLE
              value: "1"
            - name: NCCL_NVLS_ENABLE
              value: "1"
            - name: NVIDIA_GDRCOPY
              value: "1"
            - name: NCCL_SOCKET_IFNAME
              value: eth0
            - name: GLOO_SOCKET_IFNAME
              value: eth0
            - name: NCCL_STORE_TIMEOUT
              value: "7200"
            # TRT-LLM
            - name: TRTLLM_MOE_ENABLE_ALLTOALL_WITHOUT_ALLGATHER
              value: "1"
            - name: TRTLLM_ENABLE_PDL
              value: "1"
            - name: TRTLLM_SERVER_DISABLE_GC
              value: "1"
            - name: TRTLLM_WORKER_DISABLE_GC
              value: "1"
            - name: NCCL_GRAPH_MIXING_SUPPORT
              value: "0"
            - name: NCCL_MAX_NCHANNELS
              value: "2"
            - name: ENABLE_CONFIGURABLE_MOE
              value: "1"
            - name: TLLM_LOG_LEVEL
              value: "INFO"
            - name: TLLM_OVERRIDE_LAYER_NUM
              value: "61"
          volumeMounts:
            - mountPath: /dev/infiniband
              name: infiniband
            - mountPath: /model-cache
              name: model-cache
            - mountPath: /config
              name: trtllm-config
              readOnly: true
        nodeSelector:
          kubernetes.io/arch: arm64
        tolerations:
          - effect: NoSchedule
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoExecute
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Exists
          - effect: NoSchedule
            key: kubernetes.io/arch
            operator: Exists
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: kavin-compute-domain-channel
        volumes:
          - name: infiniband
            hostPath:
              path: /dev/infiniband
              type: DirectoryOrCreate
          - name: model-cache
            persistentVolumeClaim:
              claimName: shared-model-cache
          - name: trtllm-config
            configMap:
              name: kimi-planner-trtllm-config
