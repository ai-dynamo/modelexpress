# Kimi K2.5 decode source — DGD with multinode TP=8 (2 nodes × 4 GPUs)
# Publishes weights via NIXL to modelexpress-server-decode
# Phase 2: provides TP=8 weights for decode targets
# Namespace: kavin
#
# Prerequisites:
#   - modelexpress-server-decode + redis-decode running (mx-infra-decode.yaml)
#   - shared-model-cache PVC with Kimi model
#   - Dynamo platform (etcd + NATS)
#   - DGD operator webhook running
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kimi-source-decode-trtllm-config
data:
  source-decode.yaml: |
    max_num_tokens: 8192
    enable_chunked_prefill: true
    disable_overlap_scheduler: true
    cuda_graph_config:
      max_batch_size: 8
      enable_padding: true
    enable_attention_dp: true
    kv_cache_config:
      dtype: fp8
      enable_block_reuse: false
      free_gpu_memory_fraction: 0.75
      tokens_per_block: 32
    max_batch_size: 8
    max_seq_len: 256000
    model_kwargs:
      num_hidden_layers: 61
    moe_config:
      backend: TRTLLM
      use_low_precision_moe_combine: true
    moe_expert_parallel_size: 8
    num_postprocess_workers: 4
    print_iter_log: true
    stream_interval: 10
    tensor_parallel_size: 8
    trust_remote_code: true
---
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: kimi-source-decode
spec:
  services:
    source:
      componentType: worker
      envFromSecret: hf-token-secret
      multinode:
        nodeCount: 2
      replicas: 1
      resources:
        limits:
          gpu: "4"
        claims:
          - name: compute-domain-channel
      extraPodSpec:
        hostNetwork: true
        dnsPolicy: ClusterFirstWithHostNet
        securityContext: {}
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
              - matchExpressions:
                - key: cloud.google.com/gke-nodepool
                  operator: In
                  values:
                  - customer-gpu-w0e
                  - customer-gpu-o7v
          podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/part-of
                  operator: In
                  values:
                  - kimi-source-decode
              topologyKey: nvidia.com/gpu.clique
        containers: null
        imagePullSecrets:
          - name: nvcr-imagepullsecret
        mainContainer:
          image: nvcr.io/nvidian/dynamo-dev/kavink:dynamo-trtllm-mx-v1.6.0
          imagePullPolicy: Always
          workingDir: /workspace/
          securityContext:
            runAsUser: 0
          command:
            - python3
            - -m
            - dynamo.trtllm
          args:
            - --model-path
            - baseten-admin/Kimi-2.5-text-nvfp4-v3
            - --served-model-name
            - baseten-admin/Kimi-2.5-text-nvfp4-v3
            - --extra-engine-args
            - /config/source-decode.yaml
            - --model-express-url
            - modelexpress-server-decode.kavin.svc.cluster.local:8001
            - --model-express-role
            - source
            - --tensor-parallel-size
            - "8"
          env:
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: NATS_SERVER
              value: "nats://dynamo-platform-nats.kavin.svc.cluster.local:4222"
            - name: ETCD_ENDPOINTS
              value: "dynamo-platform-etcd.kavin.svc.cluster.local:2379"
            - name: MODEL_EXPRESS_URL
              value: "modelexpress-server-decode.kavin.svc.cluster.local:8001"
            - name: MODEL_NAME
              value: "baseten-admin/Kimi-2.5-text-nvfp4-v3"
            - name: MODEL_EXPRESS_SOURCE
              value: "1"
            - name: WORLD_SIZE
              value: "8"
            - name: HOME
              value: "/root"
            - name: HF_HOME
              value: /model-cache
            - name: TRITON_CACHE_DIR
              value: /model-cache/.triton-cache
            - name: NIXL_LOG_LEVEL
              value: "INFO"
            - name: UCX_LOG_LEVEL
              value: "WARN"
            - name: UCX_TLS
              value: "rc_v,rc_x,rc,dc_x,dc,cuda_copy,tcp"
            - name: UCX_RNDV_SCHEME
              value: "get_zcopy"
            - name: UCX_RNDV_THRESH
              value: "0"
            - name: OMPI_MCA_pml
              value: "ob1"
            - name: OMPI_MCA_btl
              value: "tcp,self,vader"
            - name: OMPI_MCA_btl_tcp_if_include
              value: "eth0"
            - name: OMPI_MCA_oob_tcp_if_include
              value: "eth0"
            - name: NCCL_NET_PLUGIN
              value: "none"
            - name: NCCL_CUMEM_ENABLE
              value: "1"
            - name: NCCL_NVLS_ENABLE
              value: "1"
            - name: NVIDIA_GDRCOPY
              value: "1"
            - name: NCCL_SOCKET_IFNAME
              value: eth0
            - name: GLOO_SOCKET_IFNAME
              value: eth0
            - name: NCCL_STORE_TIMEOUT
              value: "7200"
            - name: TRTLLM_MOE_ENABLE_ALLTOALL_WITHOUT_ALLGATHER
              value: "1"
            - name: TRTLLM_ENABLE_PDL
              value: "1"
            - name: TRTLLM_SERVER_DISABLE_GC
              value: "1"
            - name: TRTLLM_WORKER_DISABLE_GC
              value: "1"
            - name: NCCL_GRAPH_MIXING_SUPPORT
              value: "0"
            - name: NCCL_MAX_NCHANNELS
              value: "2"
            - name: ENABLE_CONFIGURABLE_MOE
              value: "1"
            - name: TLLM_LOG_LEVEL
              value: "INFO"
            - name: TLLM_OVERRIDE_LAYER_NUM
              value: "61"
          volumeMounts:
            - mountPath: /dev/infiniband
              name: infiniband
            - mountPath: /model-cache
              name: model-cache
            - mountPath: /config
              name: trtllm-config
              readOnly: true
        nodeSelector:
          kubernetes.io/arch: arm64
        tolerations:
          - effect: NoSchedule
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoExecute
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Exists
          - effect: NoSchedule
            key: kubernetes.io/arch
            operator: Exists
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: kavin-compute-domain-channel
        volumes:
          - name: infiniband
            hostPath:
              path: /dev/infiniband
              type: DirectoryOrCreate
          - name: model-cache
            persistentVolumeClaim:
              claimName: shared-model-cache
          - name: trtllm-config
            configMap:
              name: kimi-source-decode-trtllm-config
