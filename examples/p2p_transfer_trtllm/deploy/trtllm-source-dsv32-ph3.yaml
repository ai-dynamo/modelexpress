# Phase 3 Source: DeepSeek-V3.2 (EP=8, attention DP) — loads model per-rank, publishes live GPU params
# 8 MPI ranks, each loads its 32/256 experts + replicated attention on one GPU.
# Registers each rank's params with NIXL, publishes metadata to MX server.
#
# Prerequisites:
#   - PVC 'dsv32-nvfp4-weights' (500Gi, will download ~337 GB from HF)
#   - modelexpress-server + redis running in namespace
#   - Node with 8 H200 GPUs + RDMA/IB
#   - HF_TOKEN secret with access to nvidia/DeepSeek-V3.2-NVFP4
#
# Usage:
#   microk8s kubectl apply -f trtllm-source-dsv32-ph3.yaml -n kavin
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trtllm-source-dsv32
  labels:
    app: trtllm-source-dsv32
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trtllm-source-dsv32
  template:
    metadata:
      labels:
        app: trtllm-source-dsv32
    spec:
      containers:
        - name: source
          image: nvcr.io/nvidian/dynamo-dev/modelexpress-trtllm-client:ph3-dynamo0.9
          imagePullPolicy: Always
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          env:
            - name: MODEL_NAME
              value: "nvidia/DeepSeek-V3.2-NVFP4"
            - name: MODEL_EXPRESS_URL
              value: "modelexpress-server:8001"
            - name: HF_HUB_CACHE
              value: "/models"
            - name: WORLD_SIZE
              value: "8"
            - name: MOE_EP_SIZE
              value: "8"
            - name: NIXL_LOG_LEVEL
              value: "INFO"
            - name: UCX_LOG_LEVEL
              value: "WARN"
            - name: UCX_TLS
              value: "rc_x,rc,dc_x,dc,cuda_copy"
            - name: UCX_RNDV_SCHEME
              value: "get_zcopy"
            - name: UCX_RNDV_THRESH
              value: "0"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          command: ["bash", "-c"]
          args:
            - |
              cat > /tmp/source_dsv32.py << 'PYEOF'
              import os, time, logging, torch
              from mpi4py import MPI

              comm = MPI.COMM_WORLD
              rank = comm.Get_rank()
              world_size = comm.Get_size()

              logging.basicConfig(
                  level=logging.INFO,
                  format=f'%(asctime)s [rank{rank}] %(name)s %(levelname)s %(message)s'
              )
              logger = logging.getLogger("trtllm-live-source-dsv32")
              torch.cuda.set_device(rank)

              model_name = os.environ["MODEL_NAME"]
              mx_server = os.environ["MODEL_EXPRESS_URL"]
              moe_ep_size = int(os.environ.get("MOE_EP_SIZE", world_size))

              # Rank 0 resolves model path, broadcasts to all ranks
              if rank == 0:
                  from huggingface_hub import snapshot_download
                  local_path = snapshot_download(
                      model_name,
                      cache_dir=os.environ.get("HF_HUB_CACHE", "/models")
                  )
                  logger.info("Model resolved to: %s", local_path)
              else:
                  local_path = None
              local_path = comm.bcast(local_path, root=0)

              from tensorrt_llm._torch.models.modeling_auto import AutoModelForCausalLM
              from tensorrt_llm._torch.models.modeling_utils import MetaInitMode
              from tensorrt_llm._torch.models.checkpoints.hf.checkpoint_loader import HfCheckpointLoader
              from tensorrt_llm._torch.models.checkpoints.hf.config_loader import HfConfigLoader
              from tensorrt_llm.mapping import Mapping
              from modelexpress.trtllm_live_transfer import MxLiveSource

              t0 = time.perf_counter()

              # DEP8 Mapping: all parallelism is EP, attention is data-parallel (replicated)
              # world_size = tp_size (Mapping constraint), moe_ep_size = ep dimension
              # moe_tp_size = 1 (no MoE tensor parallelism)
              mapping = Mapping(
                  world_size=world_size,
                  tp_size=world_size,
                  rank=rank,
                  moe_ep_size=moe_ep_size,
                  moe_tp_size=1,
                  enable_attention_dp=True,
              )
              logger.info(
                  "Loading model shard (rank %d/%d, ep_rank=%d) on GPU %d",
                  rank, world_size, rank, rank
              )

              config = HfConfigLoader().load(
                  local_path, mapping=mapping, trust_remote_code=True
              )

              with MetaInitMode():
                  model = AutoModelForCausalLM.from_config(config)

              def _init_meta(t, dev=rank):
                  if t.device == torch.device('meta'):
                      return torch.empty_like(t, device=f'cuda:{dev}')
                  return t

              model._apply(_init_meta)
              model.to(f'cuda:{rank}')

              ckpt_loader = HfCheckpointLoader()
              weights = ckpt_loader.load_weights(local_path, mapping=mapping)
              weight_mapper = ckpt_loader.get_initialized_weight_mapper(model, config)

              import inspect
              load_args = inspect.getfullargspec(model.load_weights).args
              load_kwargs = {}
              if "weight_mapper" in load_args:
                  load_kwargs["weight_mapper"] = weight_mapper
              model.load_weights(weights, **load_kwargs)

              params = list(model.named_parameters())
              total_bytes = sum(p.numel() * p.element_size() for _, p in params)
              elapsed = time.perf_counter() - t0
              logger.info(
                  "Rank %d: %d params (%.2f GB) loaded in %.1fs",
                  rank, len(params), total_bytes / 1e9, elapsed
              )

              source = MxLiveSource(model, model_name, mx_server, model_path=local_path)
              source.publish()

              comm.Barrier()
              if rank == 0:
                  total_elapsed = time.perf_counter() - t0
                  logger.info(
                      "All %d ranks published in %.1fs — serving model params via NIXL",
                      world_size, total_elapsed
                  )

              while True:
                  time.sleep(3600)
              PYEOF

              mpirun --allow-run-as-root -np ${WORLD_SIZE} \
                --output-filename /tmp/mpi_logs \
                python3 -u /tmp/source_dsv32.py 2>&1 | tee /tmp/source_all.log
          resources:
            limits:
              nvidia.com/gpu: "8"
              rdma/ib: "8"
            requests:
              nvidia.com/gpu: "8"
              rdma/ib: "8"
              memory: "800Gi"
              cpu: "32"
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
            - name: model-cache
              mountPath: /models
      volumes:
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 200Gi
        - name: model-cache
          persistentVolumeClaim:
            claimName: dsv32-nvfp4-weights
      imagePullSecrets:
        - name: nvcr-imagepullsecret
