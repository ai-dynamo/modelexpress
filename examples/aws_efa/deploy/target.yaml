# Target worker for AWS EFA + libfabric NIXL backend demo.
#
# Pulls weights from the source pool via NIXL over EFA's libfabric backend.
# The EFA / libfabric env vars must match the source side - backends do not
# interoperate, and FI_PROVIDER mismatches between source and target lead
# to silent TCP fallback on one side.
#
# Prerequisites: same as deploy/source.yaml.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mx-efa-target
  labels:
    app: mx-efa-target
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mx-efa-target
  template:
    metadata:
      labels:
        app: mx-efa-target
    spec:
      containers:
        - name: vllm
          image: <YOUR_REGISTRY>/modelexpress-aws-efa:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          env:
            - name: MODEL_NAME
              value: "deepseek-ai/DeepSeek-V3"
            - name: MX_MODEL_REVISION
              value: "REPLACE_WITH_COMMIT_SHA"
            - name: VLLM_PLUGINS
              value: "modelexpress"

            # Point the client at the source Service.
            - name: MX_METADATA_ADDR
              value: "mx-efa-source:50051"

            # --- EFA / libfabric setup (must match source side) ---------
            - name: MX_NIXL_BACKEND
              value: "LIBFABRIC"
            - name: FI_PROVIDER
              value: "efa"
            - name: FI_EFA_USE_DEVICE_RDMA
              value: "1"
            - name: FI_EFA_ENABLE_SHM_TRANSFER
              value: "0"
            - name: FI_LOG_LEVEL
              value: "info"
            # ------------------------------------------------------------

            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          # See deploy/source.yaml for the command rationale.
          command: ["vllm", "serve"]
          args:
            - $(MODEL_NAME)
            - --load-format
            - mx
            - --tensor-parallel-size
            - "1"
          resources:
            limits:
              nvidia.com/gpu: 1
              vpc.amazonaws.com/efa: 4
            requests:
              nvidia.com/gpu: 1
              vpc.amazonaws.com/efa: 4
