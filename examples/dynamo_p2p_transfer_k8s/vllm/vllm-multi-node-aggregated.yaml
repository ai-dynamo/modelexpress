# Multi-node vLLM DynamoGraphDeployment with ModelExpress P2P weight transfer.
#
# Deploys nvidia/Kimi-K2.5-NVFP4 with TP=4, PP=2 (8 GPUs across 2 nodes per replica).
# Includes ModelExpress server (kubernetes CRD backend) and dynamo Frontend.
#
# Start with replicas=1 (source loads from disk), then scale to 2 for P2P:
#   kubectl apply -f rbac-modelmetadata.yaml -n <namespace>
#   kubectl apply -f vllm-multi-node-aggregated.yaml -n <namespace>
#   # Wait for source to publish metadata + DGD READY
#   # Edit replicas to 2 and re-apply, or:
#   kubectl patch dgd mx-vllm -n <ns> --type merge \
#     -p '{"spec":{"services":{"VllmWorker":{"replicas":2}}}}'
#
# Prerequisites:
#   - Dynamo operator installed (DynamoGraphDeployment CRD)
#   - ModelExpress CRDs installed (cluster-admin, one-time):
#     kubectl apply -f ../../crds.yaml
#   - RBAC applied: kubectl apply -f rbac-modelmetadata.yaml -n <namespace>
#   - PVC with model weights pre-downloaded
#   - kubectl create secret generic hf-token-secret --from-literal=HF_TOKEN=<token>
apiVersion: nvidia.com/v1alpha1
kind: DynamoGraphDeployment
metadata:
  name: mx-vllm
spec:
  backendFramework: vllm
  pvcs:
    - create: false
      name: shared-model-cache
  services:
    # ModelExpress P2P metadata server (kubernetes CRD backend).
    # Manages source discovery, heartbeats, and stale metadata reaping.
    ModelExpress:
      componentType: frontend
      replicas: 1
      livenessProbe:
        tcpSocket:
          port: 8000
        initialDelaySeconds: 5
        periodSeconds: 10
      readinessProbe:
        tcpSocket:
          port: 8000
        initialDelaySeconds: 5
        periodSeconds: 10
      extraPodSpec:
        schedulerName: default-scheduler
        serviceAccountName: modelexpress
        imagePullSecrets:
          - name: nvcr-imagepullsecret
        mainContainer:
          image: nvcr.io/nvidia/ai-dynamo/modelexpress-server:0.3.0
          command:
            - /bin/sh
            - -c
          args:
            - exec /app/modelexpress-server --port 8000
          env:
            - name: MX_METADATA_BACKEND
              value: "kubernetes"
            - name: MX_METADATA_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
        nodeSelector:
          cloud.google.com/gke-nodepool: customer-cpu
        tolerations:
          - effect: NoSchedule
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoExecute
            key: dedicated
            operator: Equal
            value: user-workload
      volumeMounts:
        - name: shared-model-cache
          mountPoint: /models

    # Dynamo Frontend: HTTP API server, round-robins to VllmWorker replicas.
    Frontend:
      componentType: frontend
      replicas: 1
      extraPodSpec:
        schedulerName: default-scheduler
        imagePullSecrets:
          - name: nvcr-imagepullsecret
        mainContainer:
          # Build using Dockerfile.client or dynamo repo (see README)
          image: nvcr.io/nvidian/dynamo-dev/model-express-dev-containers:vllm-runtime-f99ead6-arm64
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - -m
            - dynamo.frontend
          args:
            - --router-mode
            - round-robin
            - --http-port
            - "8000"
        nodeSelector:
          cloud.google.com/gke-nodepool: customer-gpu-o7v
          kubernetes.io/arch: arm64
        tolerations:
          - effect: NoSchedule
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoExecute
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Exists
          - effect: NoSchedule
            key: kubernetes.io/arch
            operator: Exists
      volumeMounts:
        - name: shared-model-cache
          mountPoint: /models

    # vLLM workers with ModelExpress P2P weight transfer.
    # Each replica spans 2 nodes (PP=2). First replica loads from disk,
    # subsequent replicas receive weights via RDMA from existing sources.
    VllmWorker:
      envFromSecret: hf-token-secret
      componentType: worker
      replicas: 1
      multinode:
        nodeCount: 2
      annotations:
        networking.gke.io/default-interface: eth0
        networking.gke.io/interfaces: |
          [
            {"interfaceName":"eth0","network":"default"},
            {"interfaceName":"rdma0","network":"rdma-0"},
            {"interfaceName":"rdma1","network":"rdma-1"},
            {"interfaceName":"rdma2","network":"rdma-2"},
            {"interfaceName":"rdma3","network":"rdma-3"}
          ]
      sharedMemory:
        size: 179Gi
      resources:
        limits:
          gpu: "4"
          custom:
            networking.gke.io.networks/rdma-0: "1"
            networking.gke.io.networks/rdma-1: "1"
            networking.gke.io.networks/rdma-2: "1"
            networking.gke.io.networks/rdma-3: "1"
      envs:
        - name: VLLM_RPC_TIMEOUT
          value: "7200000"
        - name: HF_HOME
          value: "/models"
        - name: HF_HUB_OFFLINE
          value: "1"
        - name: TRANSFORMERS_OFFLINE
          value: "1"
        - name: HF_MODULES_CACHE
          value: "/tmp/hf_modules"
        - name: TRANSFORMERS_CACHE
          value: "/models"
        - name: TRITON_CACHE_DIR
          value: "/tmp/triton-cache"
        - name: MODEL_NAME
          value: "nvidia/Kimi-K2.5-NVFP4"
        - name: VLLM_PLUGINS
          value: "modelexpress"
        - name: MX_SERVER_ADDRESS
          value: "mx-vllm-modelexpress:8000"
        - name: MX_CONTIGUOUS_REG
          value: "0"
        # Kimi-K2.5-NVFP4 uses MLA which is blocked by default.
        # P2P inference verified correct with adopt_hidden_tensors fix.
        - name: MX_SKIP_FEATURE_CHECK
          value: "1"
        # Per-rank IB NIC pinning. Workaround for openucx/ucx#11259.
        - name: MX_RDMA_NIC_PIN
          value: "auto"
        - name: NIXL_LOG_LEVEL
          value: "INFO"
        - name: NCCL_DEBUG
          value: "INFO"
        - name: NCCL_SOCKET_IFNAME
          value: "eth0"
        - name: GLOO_SOCKET_IFNAME
          value: "eth0"
        - name: NCCL_STORE_TIMEOUT
          value: "7200"
        - name: NCCL_NET_PLUGIN
          value: "none"
        - name: NCCL_IB_DISABLE
          value: "1"
        - name: NCCL_MNNVL_ENABLE
          value: "0"
        - name: UCX_LOG_LEVEL
          value: "INFO"
        - name: UCX_TLS
          value: "self,sm,rc,cuda_copy,gdr_copy,tcp"
        - name: UCX_IB_GID_INDEX
          value: "3"
        # Optional: pin UCX to specific compute-fabric HCAs if your cluster
        # exposes multiple IB fabrics. Device list is cluster-specific.
        # - name: UCX_NET_DEVICES
        #   value: "mlx5_0:1,mlx5_1:1,mlx5_2:1,mlx5_3:1"
        - name: UCX_RNDV_SCHEME
          value: "get_zcopy"
        - name: UCX_RNDV_THRESH
          value: "0"
      extraPodSpec:
        schedulerName: default-scheduler
        imagePullSecrets:
          - name: nvcr-imagepullsecret
        nodeSelector:
          cloud.google.com/gke-nodepool: customer-gpu-o7v
          kubernetes.io/arch: arm64
        tolerations:
          - effect: NoSchedule
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoExecute
            key: dedicated
            operator: Equal
            value: user-workload
          - effect: NoSchedule
            key: nvidia.com/gpu
            operator: Exists
          - effect: NoSchedule
            key: kubernetes.io/arch
            operator: Exists
        mainContainer:
          # Build using Dockerfile.client or dynamo repo (see README)
          image: nvcr.io/nvidian/dynamo-dev/model-express-dev-containers:vllm-runtime-f99ead6-arm64
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
              - IPC_LOCK
          resources:
            requests:
              ephemeral-storage: "50Gi"
              nvidia.com/gpu: "4"
            limits:
              ephemeral-storage: "50Gi"
              nvidia.com/gpu: "4"
          command:
            - python3
            - -m
            - dynamo.vllm
          args:
            - --model
            - /models/hub/models--nvidia--Kimi-K2.5-NVFP4/snapshots/c0285e649c34d4386b01e38abca642c06cbe014e
            - --served-model-name
            - nvidia/Kimi-K2.5-NVFP4
            - --load-format
            - mx
            - --tensor-parallel-size
            - "4"
            - --pipeline-parallel-size
            - "2"
            - --max-model-len
            - "256000"
            - --trust-remote-code
      volumeMounts:
        - name: shared-model-cache
          mountPoint: /models
