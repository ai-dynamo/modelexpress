  name: mx-target-rank-1
  labels:
    app: mx-target
    mx.rank: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mx-target
      mx.rank: "1"
  template:
    metadata:
      labels:
        app: mx-target
        mx.rank: "1"
    spec:
      containers:
        - name: vllm
          image: nvcr.io/nvidian/dynamo-dev/modelexpress-client:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          env:
            - name: MODEL_NAME
              value: "deepseek-ai/DeepSeek-V3"
            - name: MX_MODEL_REVISION
              value: "REPLACE_WITH_COMMIT_SHA"
            - name: VLLM_PLUGINS
              value: "modelexpress"
            - name: MX_METADATA_BACKEND
              value: "k8s-service"
            - name: MX_K8S_SERVICE_PATTERN
              value: "mx-sources-rank-{rank}:6555"
            - name: MX_K8S_SOURCE_RETRIES
              value: "5"
            - name: MX_K8S_SOURCE_BACKOFF_SECONDS
              value: "0.5"
            - name: MX_METADATA_PORT
              value: "5555"
            - name: MX_WORKER_GRPC_PORT
              value: "6555"
            - name: NIXL_LOG_LEVEL
              value: "INFO"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token-secret
                  key: HF_TOKEN
          args:
            - --model
            - $(MODEL_NAME)
            - --load-format
            - mx
            - --tensor-parallel-size
            - "1"
          ports:
            - name: worker-grpc
              containerPort: 6555
          resources:
            limits:
              nvidia.com/gpu: 1
              rdma/shared_ib: 1
            requests:
              nvidia.com/gpu: 1
              rdma/shared_ib: 1
