<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'DM Sans', sans-serif; }
      .mono { font-family: 'Space Mono', monospace; }
    </style>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00bcd4"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef5350"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#76b900"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="520" rx="16" fill="#0f1420"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" fill="#76b900" font-size="13" font-weight="700" class="mono" letter-spacing="3">ON-POLICY RL TRAINING LOOP</text>

  <!-- Rollout Box -->
  <rect x="60" y="80" width="240" height="120" rx="12" fill="#00bcd415" stroke="#00bcd4" stroke-width="2"/>
  <text x="180" y="115" text-anchor="middle" fill="#00bcd4" font-size="11" font-weight="700" class="mono" letter-spacing="2">ROLLOUT</text>
  <text x="180" y="142" text-anchor="middle" fill="#e8eaf0" font-size="15" font-weight="600">Inference Engine</text>
  <text x="180" y="164" text-anchor="middle" fill="#8892a4" font-size="13">vLLM / SGLang</text>
  <text x="180" y="184" text-anchor="middle" fill="#8892a4" font-size="12">Generate trajectories</text>

  <!-- Arrow: Rollout -> Reward -->
  <line x1="300" y1="140" x2="370" y2="140" stroke="#00bcd4" stroke-width="2" marker-end="url(#arrow-cyan)"/>

  <!-- Reward Box -->
  <rect x="375" y="100" width="200" height="80" rx="12" fill="#9c27b015" stroke="#9c27b0" stroke-width="2"/>
  <text x="475" y="130" text-anchor="middle" fill="#9c27b0" font-size="11" font-weight="700" class="mono" letter-spacing="2">REWARD</text>
  <text x="475" y="155" text-anchor="middle" fill="#e8eaf0" font-size="14" font-weight="600">Compute Rewards</text>
  <text x="475" y="172" text-anchor="middle" fill="#8892a4" font-size="12">Rule-based / Model RM</text>

  <!-- Arrow: Reward -> Train -->
  <line x1="575" y1="140" x2="645" y2="140" stroke="#00bcd4" stroke-width="2" marker-end="url(#arrow-cyan)"/>

  <!-- Training Box -->
  <rect x="650" y="80" width="250" height="120" rx="12" fill="#76b90015" stroke="#76b900" stroke-width="2"/>
  <text x="775" y="115" text-anchor="middle" fill="#76b900" font-size="11" font-weight="700" class="mono" letter-spacing="2">TRAINING</text>
  <text x="775" y="142" text-anchor="middle" fill="#e8eaf0" font-size="15" font-weight="600">Policy Gradient Update</text>
  <text x="775" y="164" text-anchor="middle" fill="#8892a4" font-size="13">FSDP2 / Megatron-LM</text>
  <text x="775" y="184" text-anchor="middle" fill="#8892a4" font-size="12">GRPO / PPO / DAPO</text>

  <!-- Arrow: Train -> Refit (going down then left) -->
  <path d="M775 200 L775 280 L180 280 L180 200" stroke="#ef5350" stroke-width="3" stroke-dasharray="8,4" fill="none" marker-end="url(#arrow-red)"/>

  <!-- Refit Box (on the return path) -->
  <rect x="350" y="250" width="260" height="60" rx="10" fill="#ef535025" stroke="#ef5350" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="480" y="278" text-anchor="middle" fill="#ef5350" font-size="16" font-weight="700">WEIGHT SYNC (REFIT)</text>
  <text x="480" y="298" text-anchor="middle" fill="#ef5350" font-size="12" class="mono">BOTTLENECK</text>

  <!-- Bottleneck Breakdown Bar -->
  <text x="480" y="350" text-anchor="middle" fill="#4a5568" font-size="11" class="mono" letter-spacing="2">ILLUSTRATIVE WALL-CLOCK BREAKDOWN</text>

  <rect x="80" y="370" width="320" height="40" rx="6" fill="#00bcd430"/>
  <text x="240" y="395" text-anchor="middle" fill="#00bcd4" font-size="12" font-weight="600" class="mono">Rollout (40%)</text>

  <rect x="400" y="370" width="80" height="40" rx="6" fill="#9c27b025"/>
  <text x="440" y="395" text-anchor="middle" fill="#9c27b0" font-size="11" font-weight="600" class="mono">Rew</text>

  <rect x="480" y="370" width="160" height="40" rx="6" fill="#76b90030"/>
  <text x="560" y="395" text-anchor="middle" fill="#76b900" font-size="12" font-weight="600" class="mono">Train (20%)</text>

  <rect x="640" y="370" width="240" height="40" rx="6" fill="#ef535035" stroke="#ef5350" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="760" y="395" text-anchor="middle" fill="#ef5350" font-size="12" font-weight="700" class="mono">REFIT (30%)</text>

  <!-- Call-out arrow to refit bar -->
  <line x1="760" y1="410" x2="760" y2="440" stroke="#ef5350" stroke-width="1.5"/>
  <text x="760" y="460" text-anchor="middle" fill="#ef5350" font-size="12" class="mono">&#x25B2; Up to 30-40% for 70B+ models</text>

  <!-- Latency numbers -->
  <text x="480" y="495" text-anchor="middle" fill="#4a5568" font-size="11" class="mono" letter-spacing="1">
    Filesystem ~20s+ | NCCL ~10s | ZMQ IPC ~3-5s | MX RDMA ~5s (target for 70B)
  </text>
</svg>
