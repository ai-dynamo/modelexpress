<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'DM Sans', sans-serif; }
      .mono { font-family: 'Space Mono', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="500" rx="16" fill="#0f1420"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" fill="#76b900" font-size="13" font-weight="700" class="mono" letter-spacing="3">FRAMEWORK INTEGRATION COMPARISON</text>

  <!-- Column headers -->
  <rect x="200" y="50" width="220" height="36" rx="8" fill="#76b90020" stroke="#76b900" stroke-width="1"/>
  <text x="310" y="73" text-anchor="middle" fill="#76b900" font-size="14" font-weight="700">NeMo RL</text>

  <rect x="440" y="50" width="220" height="36" rx="8" fill="#00bcd420" stroke="#00bcd4" stroke-width="1"/>
  <text x="550" y="73" text-anchor="middle" fill="#00bcd4" font-size="14" font-weight="700">verl</text>

  <rect x="680" y="50" width="220" height="36" rx="8" fill="#9c27b020" stroke="#9c27b0" stroke-width="1"/>
  <text x="790" y="73" text-anchor="middle" fill="#9c27b0" font-size="14" font-weight="700">PRIME-RL</text>

  <!-- Row labels and content -->
  <!-- Row 1: Training Backend -->
  <rect x="20" y="100" width="160" height="36" rx="6" fill="#1e293b"/>
  <text x="100" y="123" text-anchor="middle" fill="#e8eaf0" font-size="12" font-weight="600">Training Backend</text>

  <rect x="200" y="100" width="220" height="36" rx="6" fill="#0a0e17"/>
  <text x="310" y="123" text-anchor="middle" fill="#8892a4" font-size="12">DTensor / Megatron</text>

  <rect x="440" y="100" width="220" height="36" rx="6" fill="#0a0e17"/>
  <text x="550" y="123" text-anchor="middle" fill="#8892a4" font-size="12">FSDP / FSDP2 / Megatron</text>

  <rect x="680" y="100" width="220" height="36" rx="6" fill="#0a0e17"/>
  <text x="790" y="123" text-anchor="middle" fill="#8892a4" font-size="12">FSDP2 (EP/CP)</text>

  <!-- Row 2: Inference Backend -->
  <rect x="20" y="148" width="160" height="36" rx="6" fill="#1e293b"/>
  <text x="100" y="171" text-anchor="middle" fill="#e8eaf0" font-size="12" font-weight="600">Inference Backend</text>

  <rect x="200" y="148" width="220" height="36" rx="6" fill="#0a0e17"/>
  <text x="310" y="171" text-anchor="middle" fill="#8892a4" font-size="12">vLLM, SGLang</text>

  <rect x="440" y="148" width="220" height="36" rx="6" fill="#0a0e17"/>
  <text x="550" y="171" text-anchor="middle" fill="#8892a4" font-size="12">vLLM, SGLang, HF</text>

  <rect x="680" y="148" width="220" height="36" rx="6" fill="#0a0e17"/>
  <text x="790" y="171" text-anchor="middle" fill="#8892a4" font-size="12">vLLM</text>

  <!-- Row 3: Current Sync -->
  <rect x="20" y="196" width="160" height="36" rx="6" fill="#1e293b"/>
  <text x="100" y="219" text-anchor="middle" fill="#e8eaf0" font-size="12" font-weight="600">Current Sync</text>

  <rect x="200" y="196" width="220" height="36" rx="6" fill="#0a0e17"/>
  <text x="310" y="219" text-anchor="middle" fill="#8892a4" font-size="12">ZMQ IPC / HTTP / NCCL</text>

  <rect x="440" y="196" width="220" height="36" rx="6" fill="#0a0e17"/>
  <text x="550" y="219" text-anchor="middle" fill="#8892a4" font-size="12">NCCL / CheckpointEngine</text>

  <rect x="680" y="196" width="220" height="36" rx="6" fill="#0a0e17"/>
  <text x="790" y="219" text-anchor="middle" fill="#8892a4" font-size="12">Filesystem + HTTP</text>

  <!-- Row 4: MX Insertion Point (highlighted) -->
  <rect x="20" y="244" width="160" height="44" rx="6" fill="#1e293b"/>
  <text x="100" y="270" text-anchor="middle" fill="#e8eaf0" font-size="12" font-weight="700">MX Insertion</text>

  <rect x="200" y="244" width="220" height="44" rx="6" fill="#76b90010" stroke="#76b900" stroke-width="1"/>
  <text x="310" y="262" text-anchor="middle" fill="#76b900" font-size="11" font-weight="600">refit_policy_</text>
  <text x="310" y="278" text-anchor="middle" fill="#76b900" font-size="11" font-weight="600" class="mono">generation()</text>

  <rect x="440" y="244" width="220" height="44" rx="6" fill="#00bcd410" stroke="#00bcd4" stroke-width="1"/>
  <text x="550" y="262" text-anchor="middle" fill="#00bcd4" font-size="11" font-weight="600">CheckpointEngine</text>
  <text x="550" y="278" text-anchor="middle" fill="#00bcd4" font-size="11" font-weight="600" class="mono">ABC (v0.7)</text>

  <rect x="680" y="244" width="220" height="44" rx="6" fill="#9c27b010" stroke="#9c27b0" stroke-width="1"/>
  <text x="790" y="262" text-anchor="middle" fill="#9c27b0" font-size="11" font-weight="600">Orchestrator</text>
  <text x="790" y="278" text-anchor="middle" fill="#9c27b0" font-size="11" font-weight="600" class="mono">relay_weights()</text>

  <!-- Row 5: Primary Benefit -->
  <rect x="20" y="300" width="160" height="36" rx="6" fill="#1e293b"/>
  <text x="100" y="323" text-anchor="middle" fill="#e8eaf0" font-size="12" font-weight="600">Primary Benefit</text>

  <rect x="200" y="300" width="220" height="36" rx="6" fill="#0a0e17"/>
  <text x="310" y="323" text-anchor="middle" fill="#76b900" font-size="12" font-weight="600">RDMA replaces ZMQ/NCCL</text>

  <rect x="440" y="300" width="220" height="36" rx="6" fill="#0a0e17"/>
  <text x="550" y="323" text-anchor="middle" fill="#00bcd4" font-size="12" font-weight="600">Multi-node w/o filesystem</text>

  <rect x="680" y="300" width="220" height="36" rx="6" fill="#0a0e17"/>
  <text x="790" y="323" text-anchor="middle" fill="#9c27b0" font-size="12" font-weight="600">Eliminates disk I/O</text>

  <!-- Row 6: Orchestration -->
  <rect x="20" y="348" width="160" height="36" rx="6" fill="#1e293b"/>
  <text x="100" y="371" text-anchor="middle" fill="#e8eaf0" font-size="12" font-weight="600">Orchestration</text>

  <rect x="200" y="348" width="220" height="36" rx="6" fill="#0a0e17"/>
  <text x="310" y="371" text-anchor="middle" fill="#8892a4" font-size="12">Ray actors</text>

  <rect x="440" y="348" width="220" height="36" rx="6" fill="#0a0e17"/>
  <text x="550" y="371" text-anchor="middle" fill="#8892a4" font-size="12">Ray (driver + workers)</text>

  <rect x="680" y="348" width="220" height="36" rx="6" fill="#0a0e17"/>
  <text x="790" y="371" text-anchor="middle" fill="#8892a4" font-size="12">Lightweight orchestrator</text>

  <!-- Bottom: shared abstraction callout -->
  <rect x="100" y="410" width="760" height="60" rx="10" fill="#76b90008" stroke="#76b900" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="480" y="435" text-anchor="middle" fill="#76b900" font-size="14" font-weight="700">Shared Abstraction: WeightSyncBackend</text>
  <text x="480" y="455" text-anchor="middle" fill="#8892a4" font-size="12">Framework-agnostic interface decoupling transport mechanism from sync policy</text>
</svg>
