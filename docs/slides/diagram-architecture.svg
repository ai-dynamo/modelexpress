<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'DM Sans', sans-serif; }
      .mono { font-family: 'Space Mono', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="960" height="420" rx="16" fill="#0f1420"/>

  <!-- Title -->
  <text x="480" y="32" text-anchor="middle" fill="#76b900" font-size="13" font-weight="700" class="mono" letter-spacing="3">MODELEXPRESS RL REFIT ARCHITECTURE</text>

  <!-- ===== Training Workers ===== -->
  <rect x="20" y="55" width="280" height="310" rx="14" fill="#76b90008" stroke="#76b900" stroke-width="2"/>
  <text x="160" y="46" text-anchor="middle" fill="#76b900" font-size="11" font-weight="700" class="mono" letter-spacing="2">TRAINING WORKERS</text>

  <rect x="40" y="80" width="240" height="38" rx="7" fill="#1e293b"/>
  <text x="160" y="104" text-anchor="middle" fill="#e8eaf0" font-size="14" font-weight="600">FSDP2 / Megatron-LM</text>

  <rect x="40" y="130" width="240" height="38" rx="7" fill="#1e293b"/>
  <text x="160" y="154" text-anchor="middle" fill="#e8eaf0" font-size="14" font-weight="600">WeightExtractor</text>

  <text x="160" y="184" text-anchor="middle" fill="#4a5568" font-size="11">Gather params per bucket</text>

  <rect x="40" y="200" width="240" height="38" rx="7" fill="#76b90018" stroke="#76b900" stroke-width="1"/>
  <text x="160" y="224" text-anchor="middle" fill="#76b900" font-size="14" font-weight="700">MxTrainingPublisher</text>

  <text x="160" y="254" text-anchor="middle" fill="#4a5568" font-size="11">Register tensors with NIXL</text>
  <text x="160" y="270" text-anchor="middle" fill="#4a5568" font-size="11">Publish metadata (gRPC)</text>

  <rect x="40" y="285" width="240" height="55" rx="7" fill="#1e293b"/>
  <text x="160" y="308" text-anchor="middle" fill="#8892a4" font-size="13" font-weight="600">NIXL Agent (per GPU)</text>
  <text x="160" y="328" text-anchor="middle" fill="#4a5568" font-size="11">UCX/RDMA + registration</text>

  <!-- ===== MX Server ===== -->
  <rect x="370" y="95" width="220" height="220" rx="14" fill="#00bcd408" stroke="#00bcd4" stroke-width="2"/>
  <text x="480" y="86" text-anchor="middle" fill="#00bcd4" font-size="11" font-weight="700" class="mono" letter-spacing="2">MX SERVER</text>

  <rect x="390" y="120" width="180" height="34" rx="7" fill="#1e293b"/>
  <text x="480" y="142" text-anchor="middle" fill="#e8eaf0" font-size="13">gRPC P2P Coordination</text>

  <rect x="390" y="166" width="180" height="34" rx="7" fill="#1e293b"/>
  <text x="480" y="188" text-anchor="middle" fill="#e8eaf0" font-size="13">Redis / K8s CRD</text>

  <rect x="390" y="212" width="180" height="34" rx="7" fill="#1e293b"/>
  <text x="480" y="234" text-anchor="middle" fill="#e8eaf0" font-size="13">Version Tracking</text>

  <rect x="390" y="258" width="180" height="34" rx="7" fill="#1e293b"/>
  <text x="480" y="280" text-anchor="middle" fill="#e8eaf0" font-size="13">Refit Coordination</text>

  <!-- ===== Inference Workers ===== -->
  <rect x="660" y="55" width="280" height="310" rx="14" fill="#9c27b008" stroke="#9c27b0" stroke-width="2"/>
  <text x="800" y="46" text-anchor="middle" fill="#9c27b0" font-size="11" font-weight="700" class="mono" letter-spacing="2">INFERENCE WORKERS</text>

  <rect x="680" y="80" width="240" height="38" rx="7" fill="#1e293b"/>
  <text x="800" y="104" text-anchor="middle" fill="#e8eaf0" font-size="14" font-weight="600">vLLM / SGLang</text>

  <rect x="680" y="130" width="240" height="38" rx="7" fill="#9c27b018" stroke="#9c27b0" stroke-width="1"/>
  <text x="800" y="154" text-anchor="middle" fill="#9c27b0" font-size="14" font-weight="700">MxRefitReceiver</text>

  <text x="800" y="184" text-anchor="middle" fill="#4a5568" font-size="11">Poll for new versions</text>
  <text x="800" y="200" text-anchor="middle" fill="#4a5568" font-size="11">Receive RDMA writes</text>

  <rect x="680" y="215" width="240" height="38" rx="7" fill="#1e293b"/>
  <text x="800" y="239" text-anchor="middle" fill="#8892a4" font-size="13" font-weight="600">NIXL Agent (per GPU)</text>

  <rect x="680" y="265" width="240" height="38" rx="7" fill="#1e293b"/>
  <text x="800" y="289" text-anchor="middle" fill="#e8eaf0" font-size="13" font-weight="600">Apply weights in-place</text>

  <rect x="680" y="315" width="240" height="38" rx="7" fill="#1e293b"/>
  <text x="800" y="339" text-anchor="middle" fill="#8892a4" font-size="13">Resume rollout inference</text>

  <!-- ===== Arrows: gRPC metadata ===== -->
  <line x1="300" y1="170" x2="370" y2="170" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="366,166 374,170 366,174" fill="#00bcd4"/>
  <text x="335" y="160" text-anchor="middle" fill="#00bcd4" font-size="10" class="mono">gRPC</text>

  <line x1="590" y1="170" x2="660" y2="170" stroke="#00bcd4" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="656,166 664,170 656,174" fill="#00bcd4"/>
  <text x="625" y="160" text-anchor="middle" fill="#00bcd4" font-size="10" class="mono">gRPC</text>

  <!-- ===== Big RDMA Arrow ===== -->
  <line x1="285" y1="313" x2="675" y2="313" stroke="#76b900" stroke-width="3.5"/>
  <polygon points="669,305 683,313 669,321" fill="#76b900"/>

  <rect x="390" y="299" width="180" height="28" rx="5" fill="#0f1420" stroke="#76b900" stroke-width="1"/>
  <text x="480" y="318" text-anchor="middle" fill="#76b900" font-size="13" font-weight="700" class="mono">RDMA WRITE</text>

  <!-- Bottom label -->
  <text x="480" y="390" text-anchor="middle" fill="#4a5568" font-size="12" class="mono">
    GPU VRAM ’ GPU VRAM · Bypasses CPU, disk, and collective overhead
  </text>
  <text x="480" y="410" text-anchor="middle" fill="#4a5568" font-size="11" class="mono">
    Automatic fallback: RDMA ’ CUDA IPC ’ TCP
  </text>
</svg>
