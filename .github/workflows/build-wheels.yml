#
# Builds the modelexpress Python client wheels via docker/Dockerfile.client-wheel
# and uploads the resulting artifacts to NV Artifactory.
#
# Triggered on:
#   - pull_request: every PR push, lands under pr/<pr_id>/<sha>/<run_id>/<run_attempt>/<arch>/
#   - push to main and release/**: lands under post-merge/<sha>/<run_id>/<run_attempt>/<arch>/
#
# Runs in parallel to (does not gate on) the rest of CI. The upload step is
# environment-gated on `release_automation`, so the Artifactory secrets are
# only injected for in-repo PRs and protected pushes. Fork PR builds will run
# the buildx step (to surface broken Dockerfile changes) but skip the upload.

name: Build & upload client wheels

on:
  pull_request:
  push:
    branches:
      - main
      - 'release/**'

concurrency:
  group: build-wheels-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-and-upload:
    name: Build & upload wheels (${{ matrix.arch }})
    environment: release_automation
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: prod-modelexpress-builder-amd-v1
            platform: linux/amd64
          - arch: arm64
            runner: prod-modelexpress-builder-arm-v1
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute artifactory subpath
        id: dest
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            SUBPATH="pr/${{ github.event.pull_request.number }}/${{ github.sha }}/${{ github.run_id }}/${{ github.run_attempt }}/${{ matrix.arch }}"
          else
            SUBPATH="post-merge/${{ github.sha }}/${{ github.run_id }}/${{ github.run_attempt }}/${{ matrix.arch }}"
          fi
          echo "subpath=${SUBPATH}" >> "$GITHUB_OUTPUT"
          echo "Destination subpath: ${SUBPATH}"

      - name: Build wheels
        run: |
          mkdir -p dist
          docker buildx build \
            --platform ${{ matrix.platform }} \
            -f docker/Dockerfile.client-wheel \
            --target export \
            --output type=local,dest=./dist \
            .
          echo "Built artifacts:"
          ls -la dist/

      - name: Set up JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ secrets.ARTIFACTORY_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}

      - name: Upload to Artifactory
        run: |
          DEST="${{ secrets.ARTIFACTORY_REPO_NAME }}/${{ steps.dest.outputs.subpath }}/"
          echo "Uploading to: ${DEST}"
          jf rt upload --flat "dist/*.whl" "${DEST}"
          jf rt upload --flat "dist/*.tar.gz" "${DEST}"
