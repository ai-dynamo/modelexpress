# TEMPORARY dynamo iteration lane.
#
# Focused workflow for debugging the dynamo aggregated-serving P2P path on
# the Azure AKS CI vCluster. Trims the main workflow to: vCluster bootstrap
# (gated; see note below), dynamo-vllm worker image build, and the dynamo
# test composite action.
#
# (This file previously hosted the TRT-LLM iteration lane; repurposed for
# dynamo. To go back to TRT-LLM iteration, restore from git history.)
#
# Triggered by the same copy-pr-bot push pattern as the main workflow.
# Delete (or replace) once the dynamo path is validated and the test-dynamo
# job is wired into modelexpress-ci-tests.yml proper.
#
# IMPORTANT — Dynamo operator bootstrap:
#   The Dynamo operator is installed by setup-mx-vcluster on fresh vCluster
#   bootstrap. On a pre-existing vCluster that doesn't yet have the operator
#   installed, you need a one-time bootstrap. Two options:
#     (a) Temporarily comment out the `if:` gate on "Bootstrap vCluster"
#         below, push once, then restore the gate.
#     (b) Delete the vCluster and let bootstrap run fresh.
#   Subsequent pushes with the gate restored are no-ops on the operator side.

name: ModelExpress Dynamo Iteration

on:
  # TEMPORARY: push trigger re-enabled so the disaggregated matrix entry
  # can be validated end-to-end on this iteration lane before being added
  # to modelexpress-ci-tests.yml. Comment back out once disaggregated has
  # passed in CI and the matrix entry has been propagated to the main
  # workflow. workflow_dispatch stays available either way.
  push:
    branches:
      - "pull-request/[0-9]+"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

env:
  MX_CI_MODEL: Qwen/Qwen2.5-0.5B
  # Throwaway vCluster for dynamo iteration. Lives in its OWN host
  # namespace (mx-ci-dynamo) because vCluster doesn't support multiple
  # vClusters in the same host namespace — mx-ci already hosts the main
  # mx-ci-cluster. Delete cleanly after testing:
  #   vcluster delete mx-ci-dynamo-test -n mx-ci-dynamo --delete-namespace
  VCLUSTER_NAME: mx-ci-dynamo-test
  VCLUSTER_NAMESPACE: mx-ci-dynamo
  MX_IMAGE_REPO: nvcr.io/nvidian/dynamo-dev
  # Server image pinned to a known-good SHA so we don't rebuild it on every
  # push. Worker image is rebuilt per-push to pick up Dockerfile / manifest
  # changes.
  PINNED_SERVER_IMAGE: nvcr.io/nvidian/dynamo-dev/mx-server:6e8cb01406d696f8400da2caaa6426d0160d3509
  # vllm worker image pinned for the TP=2 verification job — we only want
  # to validate scheduling + NCCL on the non-MIG a100b pool, not iterate
  # on the worker image itself. Bump when test-tp needs newer worker bits.
  PINNED_VLLM_WORKER_IMAGE: nvcr.io/nvidian/dynamo-dev/mx-worker-vllm:00840b828ca545ab65527eef47e4874efd29f9b6

jobs:
  # ---------------------------------------------------------------------------
  # GPU + MIG + RDMA topology snapshot of the HOST AKS cluster. Independent
  # of every other job (no `needs:`), so failures here don't block the run.
  # Runs against the host kubeconfig directly because vCluster masks the
  # host's node labels (it advertises synced nodes but not their full label
  # set). Useful for catching cluster-state regressions (a non-MIG pool
  # appearing, IB device count changing, agentpool getting cordoned, etc.)
  # without having to ask ops.
  # ---------------------------------------------------------------------------
  diagnose-cluster:
    name: Diagnose host cluster (GPU + MIG + RDMA)
    runs-on: prod-modelexpress-builder-amd-v1
    permissions:
      contents: read

    steps:
      - name: Setup host kubeconfig
        env:
          KUBECONFIG_B64: ${{ secrets.AZURE_AKS_CI_KUBECONFIG_B64 }}
        run: |
          echo "${KUBECONFIG_B64}" | base64 -d > ${{ github.workspace }}/.kubeconfig-host
          chmod 600 ${{ github.workspace }}/.kubeconfig-host
          echo "KUBECONFIG=${{ github.workspace }}/.kubeconfig-host" >> $GITHUB_ENV

      - name: Nodes by agentpool
        run: |
          echo "::group::All nodes — pool membership"
          kubectl get nodes -L agentpool -L kubernetes.azure.com/agentpool
          echo "::endgroup::"

      - name: GPU + MIG labels per node
        # MIG-CONFIG values to look for:
        #   `all-disabled`     → full physical GPUs (good for TP > 1).
        #   `all-1g.10gb` etc. → sliced; cross-slice NCCL / NVLink / NVML
        #                       queries blocked by the hardware.
        run: |
          echo "::group::GPU + MIG labels (filtered to GPU nodes)"
          kubectl get nodes \
            -l nvidia.com/gpu.present=true \
            -o custom-columns='NAME:.metadata.name,POOL:.metadata.labels.agentpool,GPU-PRODUCT:.metadata.labels.nvidia\.com/gpu\.product,GPU-COUNT:.metadata.labels.nvidia\.com/gpu\.count,MIG-CONFIG:.metadata.labels.nvidia\.com/mig\.config,MIG-STRATEGY:.metadata.labels.nvidia\.com/mig\.strategy' \
            2>/dev/null \
            || kubectl get nodes -L agentpool -L nvidia.com/gpu.product -L nvidia.com/mig.config -L nvidia.com/mig.strategy
          echo "::endgroup::"

      - name: GPU node schedulability (Ready / cordon / taints / pressure)
        # A node can have GPUs advertised and still be unusable: cordoned
        # (`spec.unschedulable=true`), tainted in a way the test pod's
        # tolerations don't cover, NotReady, or under MemoryPressure /
        # DiskPressure / PIDPressure. Surface these signals explicitly so
        # "Pending pod" failures are easier to attribute.
        run: |
          echo "::group::GPU node schedulability summary"
          kubectl get nodes -l nvidia.com/gpu.present=true -o wide
          echo ""
          echo "--- Taints per GPU node ---"
          kubectl get nodes -l nvidia.com/gpu.present=true \
            -o custom-columns='NAME:.metadata.name,TAINTS:.spec.taints[*]' --no-headers
          echo ""
          echo "--- Pressure conditions (anything not 'False' here is a problem) ---"
          for NODE in $(kubectl get nodes -l nvidia.com/gpu.present=true -o jsonpath='{.items[*].metadata.name}'); do
            echo "--- ${NODE} ---"
            kubectl get node "${NODE}" -o jsonpath='{range .status.conditions[?(@.type!="Ready")]}{.type}={.status} {end}{"\n"}'
          done
          echo "::endgroup::"

      - name: Allocatable GPU + RDMA resources per GPU node
        # Surfaces nvidia.com/gpu (or per-MIG-profile equivalents) AND
        # rdma/ib / rdma/shared_ib — the binding constraints for both P2P
        # tests and parallel matrix entries.
        run: |
          echo "::group::Allocatable nvidia.com/* + rdma/* per GPU node"
          for NODE in $(kubectl get nodes -l nvidia.com/gpu.present=true -o jsonpath='{.items[*].metadata.name}'); do
            POOL=$(kubectl get node "${NODE}" -o jsonpath='{.metadata.labels.agentpool}' 2>/dev/null || echo "<no-pool>")
            echo "--- ${NODE} (pool=${POOL}) ---"
            kubectl get node "${NODE}" -o jsonpath='{range .status.allocatable}{@}{"\n"}{end}' \
              | tr ',' '\n' \
              | grep -E 'nvidia\.com/|rdma/' \
              | sed 's/^[ "]*//;s/[",}]*$//' || true
            echo ""
          done
          echo "::endgroup::"

      - name: Describe one sample GPU node per pool
        # Pulls labels + taints + a few key annotations for one node per
        # pool. Useful for spotting cordons, NoSchedule taints, or
        # device-plugin issues that the targeted columns above miss.
        run: |
          echo "::group::Sample GPU node describe per pool"
          POOLS=$(kubectl get nodes -l nvidia.com/gpu.present=true \
            -o jsonpath='{.items[*].metadata.labels.agentpool}' | tr ' ' '\n' | sort -u)
          for POOL in ${POOLS}; do
            NODE=$(kubectl get nodes -l agentpool=${POOL},nvidia.com/gpu.present=true \
              -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
            if [ -n "${NODE}" ]; then
              echo "===== Pool: ${POOL}  (sample: ${NODE}) ====="
              kubectl describe node ${NODE} | grep -E 'Labels:|Taints:|nvidia\.com|rdma|mig\.' | head -40
              echo ""
            fi
          done
          echo "::endgroup::"

  ensure-vcluster:
    name: Ensure vCluster
    runs-on: prod-modelexpress-builder-amd-v1
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check if vCluster exists
        id: vcluster-check
        uses: ./.github/actions/check-vcluster-exists
        with:
          kubeconfig_base64: ${{ secrets.AZURE_AKS_CI_KUBECONFIG_B64 }}
          vcluster_name: ${{ env.VCLUSTER_NAME }}
          vcluster_namespace: ${{ env.VCLUSTER_NAMESPACE }}

      - name: Bootstrap vCluster (first run only)
        if: steps.vcluster-check.outputs.exists != 'true'
        uses: ./.github/actions/setup-mx-vcluster
        with:
          kubeconfig_base64: ${{ secrets.AZURE_AKS_CI_KUBECONFIG_B64 }}
          vcluster_name: ${{ env.VCLUSTER_NAME }}
          vcluster_namespace: ${{ env.VCLUSTER_NAMESPACE }}
          ngc_api_key: ${{ secrets.NGC_API_KEY }}

      - name: Connect to vCluster
        uses: ./.github/actions/connect-vcluster
        with:
          host_kubeconfig_base64: ${{ secrets.AZURE_AKS_CI_KUBECONFIG_B64 }}
          vcluster_name: ${{ env.VCLUSTER_NAME }}
          vcluster_namespace: ${{ env.VCLUSTER_NAMESPACE }}

      - name: TEMP — confirm prior test namespace is gone
        # One-off check that the previous run's force-finalize safeguard
        # actually cleared the namespace. Remove once we've confirmed the
        # safeguard reliably finalizes.
        env:
          KUBECONFIG: ${{ github.workspace }}/.kubeconfig-vcluster
        run: |
          echo "::group::Status of prior test namespace mx-ci-dynamo-26275022386"
          if kubectl get ns mx-ci-dynamo-26275022386 --no-headers 2>/dev/null | grep -q .; then
            echo "STILL PRESENT — safeguard did NOT fully clean up:"
            kubectl get ns mx-ci-dynamo-26275022386 -o yaml 2>&1 | tail -40
          else
            echo "GONE — safeguard cleared it successfully."
          fi
          echo "::endgroup::"

      - name: Reap vCluster port-forward
        if: always()
        run: |
          if [ -n "${VCLUSTER_PF_PID:-}" ]; then
            kill "${VCLUSTER_PF_PID}" 2>/dev/null || true
          fi

  build-client:
    if: false
    name: Build dynamo-vllm worker image
    runs-on: prod-modelexpress-builder-amd-v1
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Compute WORKER_IMAGE
        run: |
          echo "WORKER_IMAGE=${{ env.MX_IMAGE_REPO }}/mx-worker-dynamo-vllm:${{ github.sha }}" >> "$GITHUB_ENV"

      - name: Log in to image registry
        run: |
          echo "${{ secrets.NGC_API_KEY }}" | \
            docker login nvcr.io -u '$oauthtoken' --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and push
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f ci/k8s/client/vllm/dynamo/Dockerfile \
            -t "${WORKER_IMAGE}" \
            --push \
            .

      - name: Cleanup local image
        if: always()
        run: |
          docker image rm -f "${WORKER_IMAGE}" 2>/dev/null || true

  test-dynamo:
    name: Dynamo P2P test (${{ matrix.mode }})
    runs-on: prod-modelexpress-builder-amd-v1
    needs: [ensure-vcluster]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: aggregated
            manifest: ci/k8s/client/vllm/dynamo/manifest-azure-aggregated.yaml
            dgd_name: mx-dynamo-agg-${{ github.run_id }}
            namespace: mx-ci-dynamo-agg-${{ github.run_id }}
          - mode: disaggregated
            manifest: ci/k8s/client/vllm/dynamo/manifest-azure-disaggregated.yaml
            dgd_name: mx-dynamo-disagg-${{ github.run_id }}
            namespace: mx-ci-dynamo-disagg-${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Connect to vCluster
        id: connect-vcluster
        uses: ./.github/actions/connect-vcluster
        with:
          host_kubeconfig_base64: ${{ secrets.AZURE_AKS_CI_KUBECONFIG_B64 }}
          vcluster_name: ${{ env.VCLUSTER_NAME }}
          vcluster_namespace: ${{ env.VCLUSTER_NAMESPACE }}

      - name: Run Dynamo P2P test
        uses: ./.github/actions/run-mx-dynamo-test
        with:
          kubeconfig_base64: ${{ steps.connect-vcluster.outputs.kubeconfig_base64 }}
          namespace: ${{ matrix.namespace }}
          dgd_name: ${{ matrix.dgd_name }}
          manifest: ${{ matrix.manifest }}
          mode: ${{ matrix.mode }}
          server_image: ${{ env.PINNED_SERVER_IMAGE }}
          worker_image: nvcr.io/nvidian/dynamo-dev/mx-worker-dynamo-vllm:f63cafd8796f373b97d547f6625f130e93875388
          worker_registry: nvcr.io
          ngc_api_key: ${{ secrets.NGC_API_KEY }}
          model: ${{ env.MX_CI_MODEL }}
          hf_token: ${{ secrets.HF_TOKEN }}

      - name: Reap vCluster port-forward (test-dynamo)
        if: always()
        run: |
          if [ -n "${VCLUSTER_PF_PID:-}" ]; then
            kill "${VCLUSTER_PF_PID}" 2>/dev/null || true
          fi

  test-tp:
    # vLLM TP=2 verification against the a100b pool (full physical GPUs,
    # mig.config=all-disabled). Independent of the dynamo path so it can
    # surface scheduling / NCCL / NVLink regressions even if dynamo's
    # operator install is broken. Worker image is pinned; we're only
    # validating cluster capacity + manifest correctness here.
    #
    # Disabled now that TP=2 has been validated end-to-end on a100b. The
    # actual main-workflow `test-tp` matrix entry (modelexpress-ci-tests.yml)
    # will exercise this on every PR push. Re-enable here only if iterating
    # on the TP=2 manifest or composite action itself.
    if: false
    name: P2P TP test (vllm TP=2) [disabled — validated on a100b]
    runs-on: prod-modelexpress-builder-amd-v1
    needs: [ensure-vcluster]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Connect to vCluster
        id: connect-vcluster
        uses: ./.github/actions/connect-vcluster
        with:
          host_kubeconfig_base64: ${{ secrets.AZURE_AKS_CI_KUBECONFIG_B64 }}
          vcluster_name: ${{ env.VCLUSTER_NAME }}
          vcluster_namespace: ${{ env.VCLUSTER_NAMESPACE }}

      - name: Run P2P RDMA transfer test (TP=2)
        uses: ./.github/actions/run-mx-p2p-test
        with:
          kubeconfig_base64: ${{ steps.connect-vcluster.outputs.kubeconfig_base64 }}
          namespace: mx-ci-vllm-tp2-${{ github.run_id }}
          server_image: ${{ env.PINNED_SERVER_IMAGE }}
          manifest: ci/k8s/client/vllm/manifest-azure-tp2.yaml
          test_script: ci/k8s/client/test_p2p_k8s.py
          worker_image: ${{ env.PINNED_VLLM_WORKER_IMAGE }}
          worker_registry: nvcr.io
          ngc_api_key: ${{ secrets.NGC_API_KEY }}
          model: ${{ env.MX_CI_MODEL }}
          hf_token: ${{ secrets.HF_TOKEN }}
          source_extra_env: "JOB_NAME=mx-source"
          extra_env: "JOB_NAME=mx-target"
          source_port: "8009"
          worker_port: "8010"
          tp_size: "2"

      - name: Reap vCluster port-forward (test-tp)
        if: always()
        run: |
          if [ -n "${VCLUSTER_PF_PID:-}" ]; then
            kill "${VCLUSTER_PF_PID}" 2>/dev/null || true
          fi
