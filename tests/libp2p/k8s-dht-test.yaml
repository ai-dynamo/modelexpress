# Multi-node DHT test deployment for microk8s.
#
# Deploys 3 DHT peer nodes + 1 test job, all using DNS-based peer discovery:
#   - Peers discover each other via headless Service DNS (zero config)
#   - Test job joins the DHT, runs PUT/GET tests, then exits
#
# Usage:
#   docker build -t localhost:32000/dht-test:latest -f tests/libp2p/Dockerfile .
#   docker push localhost:32000/dht-test:latest
#   kubectl apply -f k8s-dht-test.yaml
#   kubectl logs -f job/dht-test -n dht-test
#   kubectl delete ns dht-test
---
apiVersion: v1
kind: Namespace
metadata:
  name: dht-test
---
# Headless service for DNS-based peer discovery.
# All DHT pods (peers + test) register here. Resolving this service
# name returns all pod IPs, enabling zero-config bootstrap.
apiVersion: v1
kind: Service
metadata:
  name: mx-dht
  namespace: dht-test
spec:
  clusterIP: None
  selector:
    app: dht-peer
  ports:
    - port: 4001
      targetPort: 4001
      protocol: TCP
---
# DHT peer nodes - spread across physical nodes via anti-affinity
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dht-peer
  namespace: dht-test
spec:
  serviceName: mx-dht
  replicas: 3
  selector:
    matchLabels:
      app: dht-peer
  template:
    metadata:
      labels:
        app: dht-peer
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: dht-peer
                topologyKey: kubernetes.io/hostname
      containers:
        - name: dht
          image: localhost:32000/dht-test:latest
          args: ["--role", "peer", "--listen", "0.0.0.0:4001"]
          ports:
            - containerPort: 4001
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: BOOTSTRAP_DNS
              value: "mx-dht.dht-test.svc.cluster.local"
          readinessProbe:
            tcpSocket:
              port: 4001
            initialDelaySeconds: 2
            periodSeconds: 5
---
# Test job - waits for peers, joins DHT via DNS, runs tests, exits
apiVersion: batch/v1
kind: Job
metadata:
  name: dht-test
  namespace: dht-test
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: dht-test
    spec:
      restartPolicy: Never
      initContainers:
        # Wait for at least 2 peers to be ready
        - name: wait-peers
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              echo "Waiting for DHT peers..."
              while true; do
                ready=$(nslookup mx-dht.dht-test.svc.cluster.local 2>/dev/null | grep -c 'Address:' || true)
                # nslookup output includes the DNS server address, so subtract 1
                peers=$((ready - 1))
                if [ "$peers" -ge 2 ]; then
                  echo "Found $peers peer(s), proceeding"
                  break
                fi
                echo "Only $peers peer(s) ready, waiting..."
                sleep 2
              done
              # Extra settle time for DHT routing tables
              sleep 3
      containers:
        - name: dht
          image: localhost:32000/dht-test:latest
          args: ["--role", "test", "--listen", "0.0.0.0:4001"]
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: BOOTSTRAP_DNS
              value: "mx-dht.dht-test.svc.cluster.local"
